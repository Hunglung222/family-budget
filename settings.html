<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>設定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--bg2:#111827;--card:#1a2235;--card2:#202d42;--border:#2a3550;--p:#00e5b4;--p2:#00b48e;--pdim:rgba(0,229,180,.12);--blue:#4f8ef7;--bluedim:rgba(79,142,247,.12);--warn:#f59e0b;--danger:#f43f5e;--ok:#22c55e;--t:#e8edf8;--t2:#8896b3;--t3:#4a5670;--r:18px;--rs:10px;--nav:70px;--tr:.18s cubic-bezier(.4,0,.2,1)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:calc(var(--nav)+env(safe-area-inset-bottom))}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select{font-family:inherit;outline:none;border:none}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:1.2rem;font-weight:900}
.hdr small{font-size:.75rem;color:var(--t2);display:block;margin-top:1px}
.hdr-home{background:var(--pdim);color:var(--p);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:var(--tr)}
.hdr-home:active{transform:scale(.9)}

.wrap{padding:16px}

.sec-t{font-size:.72rem;font-weight:700;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px}
.sec-t:first-child{margin-top:0}

/* 資料卡 */
.data-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);font-size:.88rem}
.drow:last-child{border-bottom:none}
.drow .v{color:var(--p);font-weight:700;font-family:sans-serif}

/* 設定行 */
.set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.srow{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:var(--tr)}
.srow:last-child{border-bottom:none}
.srow:active{background:var(--card2)}
.sico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.sinfo{flex:1}
.sname{font-size:.9rem;font-weight:600}
.sdesc{font-size:.72rem;color:var(--t2);margin-top:2px}
.sarr{color:var(--t3);font-size:.9rem}

/* 分類 */
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:4px}
.citem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.citem:last-child{border-bottom:none}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cname2{font-size:.88rem;font-weight:500;flex:1}
.csub{font-size:.7rem;color:var(--t3)}
.add-row{display:flex;gap:8px;margin-top:12px}
.fc{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--t);font-size:.88rem;-webkit-appearance:none;appearance:none}
.fc:focus{border-color:var(--p);outline:none}
.btn-add-cat{padding:12px 18px;background:var(--pdim);color:var(--p);border:none;border-radius:var(--rs);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:var(--tr)}
.btn-add-cat:active{transform:scale(.95)}

/* badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:.68rem;font-weight:700;letter-spacing:.04em}
.bp{background:var(--pdim);color:var(--p)}
.bb{background:var(--bluedim);color:var(--blue)}
.bw{background:rgba(245,158,11,.14);color:var(--warn)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.overlay.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 20px 36px;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.overlay.show .sheet{transform:translateY(0)}
.sh{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.st{font-size:1.05rem;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:12px}
.flbl{font-size:.75rem;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:block}
.btn-row{display:flex;gap:10px}
.btn{width:100%;padding:15px;border-radius:var(--r);font-size:1rem;font-weight:900;font-family:inherit;transition:var(--tr);cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#000}
.btn-p:active{transform:scale(.98)}
.btn-s{background:var(--card);color:var(--t2);border:1.5px solid var(--border)}
.btn-s:active{background:var(--card2)}
.btn-d{background:rgba(244,63,94,.14);color:var(--danger);border:1.5px solid rgba(244,63,94,.3)}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav)+env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);font-size:.65rem;font-weight:600;letter-spacing:.04em;-webkit-tap-highlight-color:transparent;position:relative;transition:var(--tr)}
.ni .ico{font-size:1.4rem;line-height:1}.ni.on{color:var(--p)}
.ni.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--p);border-radius:0 0 4px 4px}
.ni-add{flex:0 0 72px}
.ni-add .fab{width:52px;height:52px;margin-top:-8px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 6px 20px rgba(0,229,180,.4);transition:var(--tr)}
.ni-add:active .fab{transform:scale(.92)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--ok);color:#fff;padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:700;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}.toast.warn{background:var(--warn)}.toast.info{background:var(--blue)}
</style>
</head>
<body>
<header class="hdr">
  <div><h1>⚙️ 設定</h1><small>管理與備份</small></div>
  <a href="index.html" class="hdr-home">🏠</a>
</header>

<div class="wrap">
  <!-- 資料統計 -->
  <div class="sec-t">📊 資料統計</div>
  <div class="data-card" id="data-stat"></div>

  <!-- 分類管理 -->
  <div class="sec-t">🏷️ 分類管理</div>
  <div class="cat-card">
    <div id="cat-list"></div>
    <div class="add-row">
      <input type="text" class="fc" id="new-cat" placeholder="新分類（含emoji）" style="flex:1">
      <button class="btn-add-cat" onclick="addCat()">＋ 新增</button>
    </div>
  </div>

  <!-- 應用操作 -->
  <div class="sec-t">🛠️ 資料管理</div>
  <div class="set-card">
    <div class="srow" onclick="exportData()">
      <div class="sico" style="background:rgba(34,197,94,.15)">📤</div>
      <div class="sinfo"><div class="sname">匯出備份（JSON）</div><div class="sdesc">下載所有記帳資料</div></div>
      <span class="sarr">›</span>
    </div>
    <div class="srow" onclick="document.getElementById('imp').click()">
      <div class="sico" style="background:var(--bluedim)">📥</div>
      <div class="sinfo"><div class="sname">匯入備份（JSON）</div><div class="sdesc">從備份檔案還原</div></div>
      <span class="sarr">›</span>
    </div>
  </div>

  <!-- 進階接口 -->
  <div class="sec-t">🔌 進階功能（接口預留）</div>
  <div class="set-card">
    <div class="srow" onclick="toast('請在 settings.html 底部填入 Firebase 設定','info')">
      <div class="sico" style="background:rgba(245,158,11,.14)">🔥</div>
      <div class="sinfo"><div class="sname">Firebase 雙人同步</div><div class="sdesc">即時同步兩人帳本</div></div>
      <span class="badge bw">待設定</span>
    </div>
    <div class="srow" onclick="toast('請在 settings.html 底部填入 Discord Webhook','info')">
      <div class="sico" style="background:var(--bluedim)">📣</div>
      <div class="sinfo"><div class="sname">Discord 記帳通知</div><div class="sdesc">記帳後自動推送通知</div></div>
      <span class="badge bb">待設定</span>
    </div>
    <div class="srow" onclick="toast('語音輸入需 HTTPS 環境，已預留接口','info')">
      <div class="sico" style="background:var(--pdim)">🎤</div>
      <div class="sinfo"><div class="sname">語音輸入</div><div class="sdesc">說話即記帳</div></div>
      <span class="badge bp">待設定</span>
    </div>
  </div>

  <!-- 危險 -->
  <div class="sec-t">⚠️ 危險操作</div>
  <div class="set-card">
    <div class="srow" onclick="confirmReset()">
      <div class="sico" style="background:rgba(244,63,94,.12)">🗑️</div>
      <div class="sinfo"><div class="sname" style="color:var(--danger)">清除所有資料</div><div class="sdesc">不可復原，請先備份</div></div>
      <span class="sarr">›</span>
    </div>
  </div>
  <div style="height:12px"></div>
</div>

<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">

<!-- 確認 Modal -->
<div class="overlay" id="confirm-modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="cm-t"></div>
    <p id="cm-m" style="color:var(--t2);font-size:.9rem;margin-bottom:20px;line-height:1.6"></p>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn btn-d" id="cm-ok">確認</button>
    </div>
  </div>
</div>

<nav class="nav">
  <a class="ni" href="index.html"><span class="ico">🏠</span><span>首頁</span></a>
  <a class="ni" href="report.html"><span class="ico">📊</span><span>報表</span></a>
  <a class="ni ni-add" href="add.html"><div class="fab">➕</div></a>
  <a class="ni" href="wallet.html"><span class="ico">👛</span><span>錢包</span></a>
  <a class="ni on" href="settings.html"><span class="ico">⚙️</span><span>設定</span></a>
</nav>
<div class="toast" id="toast"></div>

<script>
const DB={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const DEF_CATS=[{id:'food',name:'🍜 餐飲',color:'#10b981',sub:['早餐','午餐','晚餐','飲料','零食','聚餐']},{id:'transport',name:'🚌 交通',color:'#3b82f6',sub:['加油','捷運/公車','停車費','計程車']},{id:'shopping',name:'🛍️ 購物',color:'#f59e0b',sub:['服飾','3C','日用品','網購']},{id:'home',name:'🏠 居家',color:'#ec4899',sub:['房租','水費','電費','瓦斯','網路']},{id:'medical',name:'💊 醫療',color:'#8b5cf6',sub:['掛號','藥費','健檢','牙科']},{id:'entertain',name:'🎬 娛樂',color:'#06b6d4',sub:['電影','遊戲','訂閱','旅遊']},{id:'education',name:'📚 教育',color:'#84cc16',sub:['學費','補習','課程']},{id:'child',name:'👶 育兒',color:'#f97316',sub:['奶粉','玩具','衣物','托育']},{id:'other',name:'📦 其他',color:'#94a3b8',sub:['禮金','捐款','雜費']}];
const DEF_CARDS=[{id:'c1',name:'國泰世華',last4:'1234',color:'#1d4ed8'},{id:'c2',name:'台新玫瑰',last4:'5678',color:'#be185d'},{id:'c3',name:'中信鈦金',last4:'9012',color:'#374151'}];
function initDB(){if(!DB.get('cats'))DB.set('cats',DEF_CATS);if(!DB.get('cards'))DB.set('cards',DEF_CARDS);if(!DB.get('wal'))DB.set('wal',{balance:0,history:[]});if(!DB.get('bud'))DB.set('bud',{});if(!DB.get('tx'))DB.set('tx',makeDemo());}
function getTx(){return DB.get('tx')||[];}
function addTx(tx){const l=getTx();tx.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);tx.at=tx.at||new Date().toISOString();l.unshift(tx);DB.set('tx',l);if(tx.pay==='cash')walOut(tx.amount,tx.detail||catName(tx.cat));return tx;}
function delTx(id){const l=getTx();const t=l.find(x=>x.id===id);DB.set('tx',l.filter(x=>x.id!==id));if(t&&t.pay==='cash')walIn(t.amount,'刪除還原');}
function txByMonth(y,m){return getTx().filter(t=>{const d=new Date(t.at);return d.getFullYear()===y&&d.getMonth()+1===m});}
function txByRange(f,e){const s=new Date(f),en=new Date(e);en.setHours(23,59,59);return getTx().filter(t=>{const d=new Date(t.at);return d>=s&&d<=en});}
function getWal(){return DB.get('wal')||{balance:0,history:[]};}
function walIn(n,note){const w=getWal();w.balance+=n;w.history.unshift({type:'in',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function walOut(n,note){const w=getWal();w.balance=Math.max(0,w.balance-n);w.history.unshift({type:'out',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function getCats(){return DB.get('cats')||DEF_CATS;}
function catFind(id){return getCats().find(c=>c.id===id)||{name:id,color:'#94a3b8',sub:[]};}
function catName(id){return catFind(id).name;}
function addCat(c){const l=getCats();c.id='cat_'+Date.now().toString(36);l.push(c);DB.set('cats',l);}
function getCards(){return DB.get('cards')||DEF_CARDS;}
function cardFind(id){return getCards().find(c=>c.id===id)||null;}
function addCard(c){const l=getCards();c.id='cc_'+Date.now().toString(36);l.push(c);DB.set('cards',l);}
function delCard(id){DB.set('cards',getCards().filter(c=>c.id!==id));}
function getBud(){return DB.get('bud')||{};}
function getBudget(id){return getBud()[id]||0;}
function setBudget(id,n){const b=getBud();b[id]=n;DB.set('bud',b);}
function calcStats(list){const t=list.reduce((s,x)=>s+x.amount,0);const cash=list.filter(x=>x.pay==='cash').reduce((s,x)=>s+x.amount,0);const card=list.filter(x=>x.pay==='card').reduce((s,x)=>s+x.amount,0);const byCat={},byCard={},byPerson={};list.forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount;byPerson[x.person]=(byPerson[x.person]||0)+x.amount;if(x.pay==='card'&&x.cardId)byCard[x.cardId]=(byCard[x.cardId]||0)+x.amount;});return{total:t,cash,card,byCat,byCard,byPerson};}
function fmt(n){return Number(n).toLocaleString('zh-TW');}
function fmtT(s){const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtD(s){const d=new Date(s);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}
function groupDay(list){const g={};[...list].sort((a,b)=>new Date(b.at)-new Date(a.at)).forEach(t=>{const k=fmtD(t.at);if(!g[k])g[k]=[];g[k].push(t);});return g;}
function makeDemo(){const now=new Date(),y=now.getFullYear(),m=now.getMonth();const mk=(cat,detail,amount,pay,cardId,person,day,h,mi)=>({id:Date.now().toString(36)+Math.random().toString(36).slice(2),cat,detail,amount,pay,cardId:cardId||null,person,at:new Date(y,m,day,h,mi).toISOString(),subCat:''});return[mk('food','早餐豆漿油條',65,'cash',null,'宏龍',1,8,30),mk('food','家樂福採購',1280,'card','c1','盈慧',1,11,20),mk('transport','捷運悠遊卡',500,'cash',null,'宏龍',2,9,0),mk('food','晚餐火鍋',850,'card','c2','宏龍',3,18,45),mk('child','寶寶奶粉',1200,'card','c1','盈慧',4,14,10),mk('entertain','Netflix',330,'card','c2','宏龍',5,10,0),mk('medical','兒科掛號',200,'cash',null,'盈慧',6,15,30),mk('shopping','運動上衣',680,'card','c1','盈慧',8,13,20),mk('home','電費帳單',1450,'card','c3','宏龍',9,10,0),mk('child','幼稚園費用',8000,'card','c3','盈慧',14,9,0)];}
initDB();
</script>
<script>
function init(){renderStat();renderCats()}

function renderStat(){
  const tx=txAll(),w=wallet(),now=new Date();
  const m=txMonth(now.getFullYear(),now.getMonth()+1);
  document.getElementById('data-stat').innerHTML=`
    <div class="drow"><span>📋 總記帳筆數</span><span class="v">${tx.length}</span></div>
    <div class="drow"><span>📅 本月筆數</span><span class="v">${m.length}</span></div>
    <div class="drow"><span>💰 本月支出</span><span class="v">$${fmt(m.reduce((s,t)=>s+t.amount,0))}</span></div>
    <div class="drow"><span>👛 錢包餘額</span><span class="v">$${fmt(w.balance)}</span></div>
    <div class="drow"><span>🏷️ 分類數</span><span class="v">${cats().length}</span></div>
    <div class="drow"><span>💳 信用卡數</span><span class="v">${cards().length}</span></div>`;
}

function renderCats(){
  document.getElementById('cat-list').innerHTML=cats().map(c=>`
    <div class="citem">
      <div class="cdot" style="background:${c.color}"></div>
      <span class="cname2">${c.name}</span>
      <span class="csub">${c.sub.length} 子分類</span>
    </div>`).join('');
}

function addCat(){
  const name=document.getElementById('new-cat').value.trim();
  if(!name){toast('請輸入分類名稱','warn');return}
  const cols=['#00e5b4','#4f8ef7','#f59e0b','#ec4899','#8b5cf6'];
  catAdd({name,color:cols[Math.floor(Math.random()*cols.length)],sub:[]});
  document.getElementById('new-cat').value='';
  renderCats();toast(`已新增 ${name}`);
}

function exportData(){
  const d={transactions:txAll(),wallet:wallet(),categories:cats(),cards:cards(),budgets:budgets(),at:new Date().toISOString()};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=`家庭記帳_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;
  a.click();toast('備份已下載');
}

function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.transactions) localStorage.setItem('fb_tx',JSON.stringify(d.transactions));
      if(d.wallet)       localStorage.setItem('fb_wallet',JSON.stringify(d.wallet));
      if(d.categories)   localStorage.setItem('fb_cats',JSON.stringify(d.categories));
      if(d.cards)        localStorage.setItem('fb_cards',JSON.stringify(d.cards));
      if(d.budgets)      localStorage.setItem('fb_budgets',JSON.stringify(d.budgets));
      toast('匯入成功！');renderStat();renderCats();
    }catch{toast('格式錯誤','err')}
  };
  r.readAsText(f);inp.value='';
}

function confirmReset(){
  document.getElementById('cm-t').textContent='⚠️ 清除所有資料';
  document.getElementById('cm-m').textContent='這將刪除所有記帳、錢包、設定，且無法復原。請先匯出備份！';
  document.getElementById('confirm-modal').classList.add('show');
  document.getElementById('cm-ok').onclick=()=>{
    ['fb_tx','fb_wallet','fb_cats','fb_cards','fb_budgets'].forEach(k=>localStorage.removeItem(k));
    toast('已清除','err');closeModal();setTimeout(()=>location.reload(),1500);
  };
}

function closeModal(){document.getElementById('confirm-modal').classList.remove('show')}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

init();
</script>
</body>
</html>
