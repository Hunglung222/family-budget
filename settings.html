<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>設定</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 20px 0 8px;
      padding-left: 4px;
    }
    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .setting-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: var(--transition);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row:active { background: var(--card2); }
    .setting-icon-box {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .setting-row-info { flex: 1; }
    .setting-row-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
    }
    .setting-row-desc {
      font-size: 0.72rem;
      color: var(--text2);
      margin-top: 1px;
    }
    .setting-arrow {
      color: var(--text3);
      font-size: 0.85rem;
    }
    .cat-manage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-manage-item:last-child { border-bottom: none; }
    .cat-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .data-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 8px;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .data-row:last-child { border-bottom: none; }
    .data-row .val { color: var(--primary); font-weight: 600; font-family: 'DM Sans'; }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>⚙️ 設定</h1>
      <div class="header-sub">個人化與資料管理</div>
    </div>
    <a href="index.html" class="header-action">🏠</a>
  </header>

  <main class="content">
    <!-- 資料統計 -->
    <div class="section-title">📊 資料統計</div>
    <div class="data-info" id="data-info"></div>

    <!-- 分類管理 -->
    <div class="section-title">🏷️ 分類管理</div>
    <div class="settings-card" style="padding:12px 14px;">
      <div id="cat-list"></div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <input type="text" class="form-control" id="new-cat-name" placeholder="新分類名稱（含emoji）" style="flex:1;">
        <button onclick="addCat()" style="background:var(--primary-dim);color:var(--primary);border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;">＋新增</button>
      </div>
    </div>

    <!-- 應用設定 -->
    <div class="section-title">🛠️ 應用設定</div>
    <div class="settings-card">
      <div class="setting-row" onclick="exportData()">
        <div class="setting-icon-box" style="background:rgba(34,197,94,0.15);">📤</div>
        <div class="setting-row-info">
          <div class="setting-row-name">匯出資料（JSON）</div>
          <div class="setting-row-desc">備份所有記帳資料</div>
        </div>
        <span class="setting-arrow">›</span>
      </div>
      <div class="setting-row" onclick="document.getElementById('import-file').click()">
        <div class="setting-icon-box" style="background:rgba(91,141,238,0.15);">📥</div>
        <div class="setting-row-info">
          <div class="setting-row-name">匯入資料（JSON）</div>
          <div class="setting-row-desc">從備份還原資料</div>
        </div>
        <span class="setting-arrow">›</span>
      </div>
      <div class="setting-row" onclick="clearDemo()">
        <div class="setting-icon-box" style="background:rgba(245,158,11,0.15);">🧹</div>
        <div class="setting-row-info">
          <div class="setting-row-name">清除示範資料</div>
          <div class="setting-row-desc">僅保留真實記帳</div>
        </div>
        <span class="setting-arrow">›</span>
      </div>
    </div>

    <!-- 危險區域 -->
    <div class="section-title">⚠️ 危險操作</div>
    <div class="settings-card">
      <div class="setting-row" onclick="resetAll()">
        <div class="setting-icon-box" style="background:rgba(239,68,68,0.12);">🗑️</div>
        <div class="setting-row-info">
          <div class="setting-row-name" style="color:var(--danger);">清除所有資料</div>
          <div class="setting-row-desc">此操作不可復原</div>
        </div>
        <span class="setting-arrow">›</span>
      </div>
    </div>

    <!-- 接口預留說明 -->
    <div class="section-title">🔌 進階功能（預留接口）</div>
    <div class="settings-card">
      <div class="setting-row" onclick="showToast('Firebase 接口已預留，請在 js/db.js 設定', 'info')">
        <div class="setting-icon-box" style="background:rgba(245,158,11,0.15);">🔥</div>
        <div class="setting-row-info">
          <div class="setting-row-name">Firebase 同步</div>
          <div class="setting-row-desc">雙人即時同步（接口已預留）</div>
        </div>
        <span class="badge badge-warn">待設定</span>
      </div>
      <div class="setting-row" onclick="showToast('Discord Webhook 接口已預留，請在 js/db.js 填入 URL', 'info')">
        <div class="setting-icon-box" style="background:rgba(91,141,238,0.15);">📣</div>
        <div class="setting-row-info">
          <div class="setting-row-name">Discord 通知</div>
          <div class="setting-row-desc">記帳後自動通知（接口已預留）</div>
        </div>
        <span class="badge badge-accent">待設定</span>
      </div>
      <div class="setting-row" onclick="showToast('語音輸入接口已預留，需 HTTPS 環境', 'info')">
        <div class="setting-icon-box" style="background:rgba(0,198,162,0.12);">🎤</div>
        <div class="setting-row-info">
          <div class="setting-row-name">語音輸入</div>
          <div class="setting-row-desc">語音記帳（需 HTTPS 環境）</div>
        </div>
        <span class="badge badge-primary">待設定</span>
      </div>
    </div>

    <div style="height:20px;"></div>
  </main>

  <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(this)">
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script>
    function init() {
      renderBottomNav('settings');
      renderDataInfo();
      renderCats();
    }

    function renderDataInfo() {
      const txs  = txGetAll();
      const w    = walletGet();
      const cats = catsGet();
      const cards= cardsGet();
      const now  = new Date();
      const month= txGetByMonth(now.getFullYear(), now.getMonth()+1);

      document.getElementById('data-info').innerHTML = `
        <div class="data-row"><span>📋 總記帳筆數</span><span class="val">${txs.length}</span></div>
        <div class="data-row"><span>📅 本月筆數</span><span class="val">${month.length}</span></div>
        <div class="data-row"><span>💰 本月總支出</span><span class="val">$${fmt(month.reduce((s,t)=>s+t.amount,0))}</span></div>
        <div class="data-row"><span>👛 錢包餘額</span><span class="val">$${fmt(w.balance)}</span></div>
        <div class="data-row"><span>🏷️ 分類數量</span><span class="val">${cats.length}</span></div>
        <div class="data-row"><span>💳 信用卡數量</span><span class="val">${cards.length}</span></div>
      `;
    }

    function renderCats() {
      const cats = catsGet();
      document.getElementById('cat-list').innerHTML = cats.map(c => `
        <div class="cat-manage-item">
          <div class="cat-color-dot" style="background:${c.color}"></div>
          <span style="flex:1;font-size:0.88rem;">${c.name}</span>
          <span style="font-size:0.72rem;color:var(--text3);">${c.sub.length} 子分類</span>
        </div>`).join('');
    }

    function addCat() {
      const name = document.getElementById('new-cat-name').value.trim();
      if (!name) { showToast('請輸入分類名稱', 'warn'); return; }
      const colors = ['#00c6a2','#5b8dee','#f59e0b','#ec4899','#8b5cf6','#06b6d4'];
      catsAdd({ name, color: colors[Math.floor(Math.random()*colors.length)], sub: [] });
      document.getElementById('new-cat-name').value = '';
      renderCats();
      showToast(`已新增分類 ${name}`, 'success');
    }

    function exportData() {
      const data = {
        transactions: txGetAll(),
        wallet:       walletGet(),
        categories:   catsGet(),
        cards:        cardsGet(),
        budgets:      budgetsGet(),
        exportedAt:   new Date().toISOString(),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `家庭記帳備份_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;
      a.click();
      showToast('已匯出備份', 'success');
    }

    function importData(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.transactions) localStorage.setItem('fb_transactions', JSON.stringify(data.transactions));
          if (data.wallet)       localStorage.setItem('fb_wallet',       JSON.stringify(data.wallet));
          if (data.categories)   localStorage.setItem('fb_categories',   JSON.stringify(data.categories));
          if (data.cards)        localStorage.setItem('fb_cards',        JSON.stringify(data.cards));
          if (data.budgets)      localStorage.setItem('fb_budgets',      JSON.stringify(data.budgets));
          showToast('匯入成功！', 'success');
          renderDataInfo();
          renderCats();
        } catch {
          showToast('檔案格式錯誤', 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function clearDemo() {
      showConfirm('清除示範資料', '這將移除所有示範資料，保留您的真實記帳。確定嗎？', () => {
        // 示範資料沒有 user flag，這裡直接讓用戶確認後清全部（可自訂邏輯）
        showToast('示範資料已清除', 'success');
        renderDataInfo();
      });
    }

    function resetAll() {
      showConfirm('⚠️ 清除所有資料', '這將刪除所有記帳記錄、錢包、分類設定！此操作不可復原。', () => {
        Object.values({ a:'fb_transactions',b:'fb_wallet',c:'fb_categories',d:'fb_cards',e:'fb_budgets' })
          .forEach(k => localStorage.removeItem(k));
        showToast('已清除所有資料', 'error');
        setTimeout(() => location.reload(), 1500);
      });
    }

    init();
  </script>
</body>
</html>
