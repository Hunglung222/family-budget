<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>家庭記帳 — 登入</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--card:#1a2235;--border:#2a3550;--p:#00e5b4;--p2:#00b48e;--t:#e8edf8;--t2:#8896b3;--danger:#f43f5e}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

.logo-wrap{text-align:center;margin-bottom:40px}
.logo{font-size:5rem;line-height:1;margin-bottom:16px;animation:floatin 3s ease-in-out infinite}
@keyframes floatin{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.app-name{font-size:1.8rem;font-weight:900;letter-spacing:-.02em;color:var(--t)}
.app-sub{font-size:.88rem;color:var(--t2);margin-top:6px}

.login-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;text-align:center}
.login-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.login-desc{font-size:.82rem;color:var(--t2);margin-bottom:24px;line-height:1.6}

.btn-google{
  width:100%;padding:16px;border-radius:14px;
  background:#fff;color:#1f2937;
  border:none;font-family:inherit;font-size:1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:12px;
  cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.3);
  -webkit-tap-highlight-color:transparent;
}
.btn-google:active{transform:scale(.97)}
.btn-google img{width:24px;height:24px}
.btn-google.loading{opacity:.7;pointer-events:none}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:.72rem;color:var(--t2)}

.members{display:flex;gap:12px;justify-content:center}
.member{display:flex;flex-direction:column;align-items:center;gap:6px}
.member-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.member-name{font-size:.72rem;color:var(--t2)}

.error-msg{background:rgba(244,63,94,.12);color:var(--danger);border-radius:10px;padding:12px 16px;font-size:.84rem;margin-top:16px;display:none;line-height:1.5}
.error-msg.show{display:block}

.loading-overlay{position:fixed;inset:0;background:rgba(10,15,30,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--t2);font-size:.88rem}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">🏡</div>
  <div class="app-name">家庭記帳</div>
  <div class="app-sub">宏龍 & 盈慧 專用</div>
</div>

<div class="login-card">
  <div class="login-title">👋 歡迎回來</div>
  <div class="login-desc">使用 Google 帳號登入<br>資料即時同步，兩人共用</div>

  <button class="btn-google" id="btn-login" onclick="loginGoogle()">
    <img src="https://www.google.com/favicon.ico" alt="Google">
    用 Google 帳號登入
  </button>

  <div class="error-msg" id="error-msg"></div>

  <div class="divider"><span>限定使用者</span></div>

  <div class="members">
    <div class="member">
      <div class="member-avatar">🙋</div>
      <div class="member-name">宏龍</div>
    </div>
    <div class="member">
      <div class="member-avatar">🙋‍♀️</div>
      <div class="member-name">盈慧</div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">登入中...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const FB_CFG = {
  apiKey:"AIzaSyA2FVuIV_5sMUxd851XhTcSMQIg0m1Lh6M",
  authDomain:"family-budget-aed64.firebaseapp.com",
  projectId:"family-budget-aed64",
  storageBucket:"family-budget-aed64.firebasestorage.app",
  messagingSenderId:"714512661107",
  appId:"1:714512661107:web:022f9c7f7b828b5eb9c806",
};

// 只允許這兩個帳號
const ALLOWED = [
  'kevin67222@gmail.com',
  'gogosuperbird@gmail.com',
];

firebase.initializeApp(FB_CFG);
const auth = firebase.auth();

// 檢查是否已登入
auth.onAuthStateChanged(user => {
  if (user && ALLOWED.includes(user.email)) {
    // 已登入且有權限，直接進入
    window.location.replace('./add.html');
  }
});

async function loginGoogle() {
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  const loading = document.getElementById('loading');

  btn.classList.add('loading');
  errEl.classList.remove('show');
  loading.classList.add('show');

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const email = result.user.email;

    if (!ALLOWED.includes(email)) {
      // 無權限，登出並顯示錯誤
      await auth.signOut();
      loading.classList.remove('show');
      btn.classList.remove('loading');
      errEl.textContent = `❌ 抱歉，${email} 沒有使用權限。\n此 App 僅限宏龍與盈慧使用。`;
      errEl.classList.add('show');
      return;
    }

    // 儲存登入者身份
    const name = email === 'kevin67222@gmail.com' ? '宏龍' : '盈慧';
    localStorage.setItem('current_user', name);
    localStorage.setItem('current_email', email);

    // 進入 App
    window.location.replace('./add.html');

  } catch(e) {
    loading.classList.remove('show');
    btn.classList.remove('loading');
    if (e.code !== 'auth/popup-closed-by-user') {
      errEl.textContent = '登入失敗，請再試一次。';
      errEl.classList.add('show');
    }
  }
}
</script>
</body>
</html>
