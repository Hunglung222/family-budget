<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--bg2:#111827;--card:#1a2235;--card2:#202d42;--border:#2a3550;--p:#00e5b4;--p2:#00b48e;--pdim:rgba(0,229,180,.12);--blue:#4f8ef7;--bluedim:rgba(79,142,247,.12);--warn:#f59e0b;--danger:#f43f5e;--ok:#22c55e;--t:#e8edf8;--t2:#8896b3;--t3:#4a5670;--r:18px;--rs:10px;--nav:70px;--tr:.18s cubic-bezier(.4,0,.2,1)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:calc(var(--nav)+env(safe-area-inset-bottom))}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select{font-family:inherit;outline:none;border:none}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:1.2rem;font-weight:900}
.hdr small{font-size:.75rem;color:var(--t2);display:block;margin-top:1px}

.wrap{padding:16px}

/* 日期區間 */
.range-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.range-t{font-size:.72rem;font-weight:700;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.drow{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.drow .fc{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 12px;color:var(--t);font-size:.88rem;-webkit-appearance:none;appearance:none;color-scheme:dark}
.drow .fc:focus{border-color:var(--p)}
.dsep{color:var(--t3);font-size:.85rem;flex-shrink:0}
.preset-row{display:flex;gap:6px}
.pb{padding:9px 14px;border-radius:50px;background:var(--card2);border:1.5px solid var(--border);color:var(--t2);font-size:.78rem;font-weight:600;cursor:pointer;transition:var(--tr);font-family:inherit}
.pb:active{background:var(--pdim);border-color:var(--p);color:var(--p);transform:scale(.95)}
.btn-q{padding:9px 18px;background:linear-gradient(135deg,var(--p),var(--p2));color:#000;border-radius:50px;font-size:.82rem;font-weight:900;cursor:pointer;transition:var(--tr);border:none;font-family:inherit;margin-left:auto}
.btn-q:active{transform:scale(.95)}

/* 頁籤 */
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);padding:4px;border-radius:12px;margin-bottom:14px}
.tab{flex:1;padding:10px 4px;border-radius:9px;background:none;border:none;color:var(--t2);font-size:.75rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit;text-align:center}
.tab.on{background:var(--pdim);color:var(--p)}

.panel{display:none}.panel.on{display:block}

/* 總覽 */
.sgrid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.sc .v{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;color:var(--t)}
.sc .l{font-size:.7rem;color:var(--t2);margin-top:4px;font-weight:600;letter-spacing:.06em}

.ratio-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ct{font-size:.75rem;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.rbar{height:14px;border-radius:7px;background:var(--bg2);overflow:hidden;display:flex;margin:8px 0 6px}
.rf-cash{background:var(--p);transition:width .6s ease}
.rf-card{background:var(--blue);flex:1}
.rlbls{display:flex;justify-content:space-between;font-size:.78rem;color:var(--t2)}
.rlbls strong{color:var(--t);font-weight:700}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-wrap{position:relative;height:220px}

.legend{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.li{display:flex;align-items:center;gap:10px}
.ldot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lname{font-size:.84rem;color:var(--t2);flex:1}
.lpct{font-size:.82rem;font-weight:700;color:var(--t)}
.lamt{font-size:.8rem;color:var(--t2);min-width:72px;text-align:right}

/* 月趨勢 */
.month-chart{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}

/* 預算 */
.bitem{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.bhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bcat{font-size:.92rem;font-weight:600}
.binput{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--t);font-size:.88rem;width:110px;-moz-appearance:textfield;text-align:right}
.binput:focus{border-color:var(--p);outline:none}
.binput::-webkit-inner-spin-button{-webkit-appearance:none}
.bbar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin:6px 0 4px}
.bfill{height:100%;border-radius:4px;transition:width .6s ease;background:var(--p)}
.bfill.w{background:var(--warn)}.bfill.d{background:var(--danger)}
.bamts{font-size:.76rem;color:var(--t2)}
.bwarn{font-size:.72rem;font-weight:700;margin-top:4px}
.bwarn.w{color:var(--warn)}.bwarn.d{color:var(--danger)}

.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty .ei{font-size:2.8rem;margin-bottom:8px}
.empty p{font-size:.88rem}

/* card breakdown */
.cb-item{margin-bottom:12px}
.cb-hdr{display:flex;justify-content:space-between;margin-bottom:5px;font-size:.84rem}
.cb-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.cb-fill{height:100%;border-radius:4px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav)+env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);font-size:.65rem;font-weight:600;letter-spacing:.04em;-webkit-tap-highlight-color:transparent;position:relative;transition:var(--tr)}
.ni .ico{font-size:1.4rem;line-height:1}.ni.on{color:var(--p)}
.ni.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--p);border-radius:0 0 4px 4px}
.ni-add{flex:0 0 72px}
.ni-add .fab{width:52px;height:52px;margin-top:-8px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 6px 20px rgba(0,229,180,.4);transition:var(--tr)}
.ni-add:active .fab{transform:scale(.92)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--ok);color:#fff;padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:700;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.warn{background:var(--warn)}
</style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
</head>
<body>
<header class="hdr">
  <div><h1>📊 報表分析</h1><small id="range-lbl">本月</small></div>
</header>

<div class="wrap">
  <!-- 日期區間 -->
  <div class="range-card">
    <div class="range-t">📅 日期區間</div>
    <div class="drow">
      <input type="date" class="fc" id="df" style="color-scheme:dark">
      <span class="dsep">→</span>
      <input type="date" class="fc" id="dt" style="color-scheme:dark">
    </div>
    <div class="preset-row">
      <button class="pb" onclick="preset('month')">本月</button>
      <button class="pb" onclick="preset('30')">近30天</button>
      <button class="pb" onclick="preset('q')">近3月</button>
      <button class="btn-q" onclick="load()">查詢</button>
    </div>
  </div>

  <!-- 頁籤 -->
  <div class="tabs">
    <button class="tab on" onclick="sw('ov',this)">📈 總覽</button>
    <button class="tab" onclick="sw('cat',this)">🏷️ 分類</button>
    <button class="tab" onclick="sw('mon',this)">📅 月份</button>
    <button class="tab" onclick="sw('bud',this)">🎯 預算</button>
  </div>

  <!-- 總覽 -->
  <div class="panel on" id="p-ov">
    <div class="sgrid4">
      <div class="sc"><div class="v" id="ov-t">0</div><div class="l">💰 總支出</div></div>
      <div class="sc"><div class="v" id="ov-n">0</div><div class="l">📋 筆數</div></div>
      <div class="sc"><div class="v" id="ov-cd">0</div><div class="l">💳 信用卡</div></div>
      <div class="sc"><div class="v" id="ov-cs">0</div><div class="l">💵 現金</div></div>
    </div>
    <div class="ratio-card">
      <div class="ct">付款方式比例</div>
      <div class="rbar"><div class="rf-cash" id="rbar-c" style="width:50%"></div><div class="rf-card"></div></div>
      <div class="rlbls"><span>💵 現金 <strong id="rp-c">0%</strong></span><span>💳 信用卡 <strong id="rp-cc">0%</strong></span></div>
    </div>
    <div class="chart-card">
      <div class="ct">信用卡各卡消費</div>
      <div id="cb-list"></div>
    </div>
    <div class="chart-card">
      <div class="ct">👥 雙人消費</div>
      <div class="chart-wrap" style="height:200px"><canvas id="person-c"></canvas></div>
    </div>
  </div>

  <!-- 分類 -->
  <div class="panel" id="p-cat">
    <div class="chart-card">
      <div class="ct">分類支出</div>
      <div class="chart-wrap"><canvas id="pie-c"></canvas></div>
      <div class="legend" id="pie-leg"></div>
    </div>
  </div>

  <!-- 月份 -->
  <div class="panel" id="p-mon">
    <div class="month-chart">
      <div class="ct">每月支出趨勢</div>
      <div class="chart-wrap"><canvas id="bar-c"></canvas></div>
    </div>
  </div>

  <!-- 預算 -->
  <div class="panel" id="p-bud">
    <div style="font-size:.78rem;color:var(--t2);margin-bottom:12px">設定各分類月預算，輸入後自動儲存</div>
    <div id="bud-list"></div>
  </div>
</div>

<script>
const DB={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const DEF_CATS=[{id:'food',name:'🍜 餐飲',color:'#10b981',sub:['早餐','午餐','晚餐','飲料','零食','聚餐']},{id:'transport',name:'🚌 交通',color:'#3b82f6',sub:['加油','捷運/公車','停車費','計程車']},{id:'shopping',name:'🛍️ 購物',color:'#f59e0b',sub:['服飾','3C','日用品','網購']},{id:'home',name:'🏠 居家',color:'#ec4899',sub:['房租','水費','電費','瓦斯','網路']},{id:'medical',name:'💊 醫療',color:'#8b5cf6',sub:['掛號','藥費','健檢','牙科']},{id:'entertain',name:'🎬 娛樂',color:'#06b6d4',sub:['電影','遊戲','訂閱','旅遊']},{id:'education',name:'📚 教育',color:'#84cc16',sub:['學費','補習','課程']},{id:'child',name:'👶 育兒',color:'#f97316',sub:['奶粉','玩具','衣物','托育']},{id:'other',name:'📦 其他',color:'#94a3b8',sub:['禮金','捐款','雜費']}];
const DEF_CARDS=[{id:'c1',name:'國泰世華',last4:'1234',color:'#1d4ed8'},{id:'c2',name:'台新玫瑰',last4:'5678',color:'#be185d'},{id:'c3',name:'中信鈦金',last4:'9012',color:'#374151'}];
function initDB(){
  const mg=(o,n)=>{const v=localStorage.getItem(o);if(v&&!DB.get(n)){try{DB.set(n,JSON.parse(v))}catch{}}localStorage.removeItem(o);};
  mg('fb_transactions','tx');mg('fb_wallet','wal');mg('fb_categories','cats');mg('fb_cards','cards');mg('fb_budgets','bud');mg('fb_tx','tx');mg('fb_cats','cats');
  if(!DB.get('cats'))DB.set('cats',DEF_CATS);if(!DB.get('cards'))DB.set('cards',DEF_CARDS);if(!DB.get('wal'))DB.set('wal',{balance:0,history:[]});if(!DB.get('bud'))DB.set('bud',{});if(!DB.get('tx'))DB.set('tx',[]);
}
function getTx(){return DB.get('tx')||[];}
function addTx(tx){const l=getTx();tx.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);tx.at=tx.at||new Date().toISOString();l.unshift(tx);DB.set('tx',l);if(tx.pay==='cash')walOut(tx.amount,tx.detail||catName(tx.cat));return tx;}
function delTx(id){const l=getTx();const t=l.find(x=>x.id===id);DB.set('tx',l.filter(x=>x.id!==id));if(t&&t.pay==='cash')walIn(t.amount,'刪除還原');}
function txByMonth(y,m){return getTx().filter(t=>{const d=new Date(t.at);return d.getFullYear()===y&&d.getMonth()+1===m});}
function txByRange(f,e){const s=new Date(f),en=new Date(e);en.setHours(23,59,59);return getTx().filter(t=>{const d=new Date(t.at);return d>=s&&d<=en});}
function getWal(){return DB.get('wal')||{balance:0,history:[]};}
function walIn(n,note){const w=getWal();w.balance+=n;w.history.unshift({type:'in',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function walOut(n,note){const w=getWal();w.balance=Math.max(0,w.balance-n);w.history.unshift({type:'out',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function getCats(){return DB.get('cats')||DEF_CATS;}
function catFind(id){return getCats().find(c=>c.id===id)||{name:id,color:'#94a3b8',sub:[]};}
function catName(id){return catFind(id).name;}
function addCat(c){const l=getCats();c.id='cat_'+Date.now().toString(36);l.push(c);DB.set('cats',l);}
function getCards(){return DB.get('cards')||DEF_CARDS;}
function cardFind(id){return getCards().find(c=>c.id===id)||null;}
function addCard(c){const l=getCards();c.id='cc_'+Date.now().toString(36);l.push(c);DB.set('cards',l);}
function delCard(id){DB.set('cards',getCards().filter(c=>c.id!==id));}
function getBud(){return DB.get('bud')||{};}
function getBudget(id){return getBud()[id]||0;}
function setBudget(id,n){const b=getBud();b[id]=n;DB.set('bud',b);}
function calcStats(list){const t=list.reduce((s,x)=>s+x.amount,0);const cash=list.filter(x=>x.pay==='cash').reduce((s,x)=>s+x.amount,0);const card=list.filter(x=>x.pay==='card').reduce((s,x)=>s+x.amount,0);const byCat={},byCard={},byPerson={};list.forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount;byPerson[x.person]=(byPerson[x.person]||0)+x.amount;if(x.pay==='card'&&x.cardId)byCard[x.cardId]=(byCard[x.cardId]||0)+x.amount;});return{total:t,cash,card,byCat,byCard,byPerson};}
function fmt(n){return Number(n).toLocaleString('zh-TW');}
function fmtT(s){const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtD(s){const d=new Date(s);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}
function groupDay(list){const g={};[...list].sort((a,b)=>new Date(b.at)-new Date(a.at)).forEach(t=>{const k=fmtD(t.at);if(!g[k])g[k]=[];g[k].push(t);});return g;}
function makeDemo(){const now=new Date(),y=now.getFullYear(),m=now.getMonth();const mk=(cat,detail,amount,pay,cardId,person,day,h,mi)=>({id:Date.now().toString(36)+Math.random().toString(36).slice(2),cat,detail,amount,pay,cardId:cardId||null,person,at:new Date(y,m,day,h,mi).toISOString(),subCat:''});return[mk('food','早餐豆漿油條',65,'cash',null,'宏龍',1,8,30),mk('food','家樂福採購',1280,'card','c1','盈慧',1,11,20),mk('transport','捷運悠遊卡',500,'cash',null,'宏龍',2,9,0),mk('food','晚餐火鍋',850,'card','c2','宏龍',3,18,45),mk('child','寶寶奶粉',1200,'card','c1','盈慧',4,14,10),mk('entertain','Netflix',330,'card','c2','宏龍',5,10,0),mk('medical','兒科掛號',200,'cash',null,'盈慧',6,15,30),mk('shopping','運動上衣',680,'card','c1','盈慧',8,13,20),mk('home','電費帳單',1450,'card','c3','宏龍',9,10,0),mk('child','幼稚園費用',8000,'card','c3','盈慧',14,9,0)];}
initDB();
</script>
<script>
Chart.defaults.color='#8896b3';
Chart.defaults.font.family="'Noto Sans TC',sans-serif";

let pieC=null,barC=null,personC=null,txData=[];

const COLS=['#00e5b4','#4f8ef7','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#84cc16','#f97316','#94a3b8'];

function init(){preset('month');load()}

function preset(t){
  const now=new Date();let f,e;
  if(t==='month'){f=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0)}
  else if(t==='30'){f=new Date(now-30*864e5);e=now}
  else{f=new Date(now.getFullYear(),now.getMonth()-2,1);e=now}
  document.getElementById('df').value=f.toISOString().slice(0,10);
  document.getElementById('dt').value=e.toISOString().slice(0,10);
}

function load(){
  const f=document.getElementById('df').value,e=document.getElementById('dt').value;
  if(!f||!e){toast('請選擇日期','warn');return}
  txData=txRange(f,e);
  document.getElementById('range-lbl').textContent=`${f} ～ ${e}（${txData.length}筆）`;
  renderOv();renderPie();renderBar();renderBud();
}

function renderOv(){
  const s=stats(txData);
  document.getElementById('ov-t').textContent='$'+fmt(s.total);
  document.getElementById('ov-n').textContent=txData.length;
  document.getElementById('ov-cd').textContent='$'+fmt(s.card);
  document.getElementById('ov-cs').textContent='$'+fmt(s.cash);
  const cp=s.total>0?Math.round(s.cash/s.total*100):0;
  document.getElementById('rbar-c').style.width=cp+'%';
  document.getElementById('rp-c').textContent=cp+'%';
  document.getElementById('rp-cc').textContent=(100-cp)+'%';
  // card breakdown
  const el=document.getElementById('cb-list');
  if(!Object.keys(s.byCard).length){el.innerHTML='<div style="color:var(--t3);font-size:.84rem;text-align:center;padding:8px">無信用卡消費</div>';return}
  el.innerHTML=Object.entries(s.byCard).sort((a,b)=>b[1]-a[1]).map(([cid,amt])=>{
    const c=cardFind(cid);const pct=s.card>0?Math.round(amt/s.card*100):0;
    return `<div class="cb-item">
      <div class="cb-hdr"><span>${c?c.name:cid}</span><span style="font-weight:700">$${fmt(amt)}</span></div>
      <div class="cb-bar"><div class="cb-fill" style="width:${pct}%;background:${c?.color||'var(--blue)'}"></div></div>
    </div>`;
  }).join('');
  // person doughnut
  if(personC) personC.destroy();
  const p1=s.byPerson['宏龍']||0,p2=s.byPerson['盈慧']||0;
  personC=new Chart(document.getElementById('person-c'),{
    type:'doughnut',
    data:{labels:['宏龍','盈慧'],datasets:[{data:[p1,p2],backgroundColor:['#00e5b4','#4f8ef7'],borderColor:'#1a2235',borderWidth:3}]},
    options:{cutout:'65%',plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>`$${fmt(c.raw)} (${Math.round(c.raw/(p1+p2||1)*100)}%)`}}}},
  });
}

function renderPie(){
  const s=stats(txData);const ent=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1]);
  if(pieC) pieC.destroy();
  if(!ent.length){document.getElementById('pie-leg').innerHTML='<div class="empty"><div class="ei">📊</div><p>無資料</p></div>';return}
  const labs=ent.map(([id])=>catName(id));
  const vals=ent.map(([,v])=>v);
  const cols=ent.map(([id],i)=>catFind(id).color||COLS[i%COLS.length]);
  pieC=new Chart(document.getElementById('pie-c'),{
    type:'doughnut',
    data:{labels:labs,datasets:[{data:vals,backgroundColor:cols,borderColor:'#1a2235',borderWidth:3}]},
    options:{cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${fmt(c.raw)} (${Math.round(c.raw/s.total*100)}%)`}}}},
  });
  document.getElementById('pie-leg').innerHTML=ent.map(([id,amt],i)=>{
    const pct=s.total>0?Math.round(amt/s.total*100):0;
    return `<div class="li"><div class="ldot" style="background:${cols[i]}"></div><span class="lname">${catName(id)}</span><span class="lpct">${pct}%</span><span class="lamt">$${fmt(amt)}</span></div>`;
  }).join('');
}

function renderBar(){
  const all=txAll();const mm={};
  all.forEach(t=>{const d=new Date(t.at);const k=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;mm[k]=(mm[k]||0)+t.amount});
  const ks=Object.keys(mm).sort().slice(-12);const vs=ks.map(k=>mm[k]);
  if(barC) barC.destroy();
  barC=new Chart(document.getElementById('bar-c'),{
    type:'bar',
    data:{labels:ks.map(k=>k.slice(2)),datasets:[{label:'支出',data:vs,
      backgroundColor:ks.map((_,i)=>i===ks.length-1?'rgba(0,229,180,.7)':'rgba(79,142,247,.35)'),
      borderColor:ks.map((_,i)=>i===ks.length-1?'#00e5b4':'#4f8ef7'),
      borderWidth:1.5,borderRadius:8}]},
    options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(42,53,80,.5)'},ticks:{callback:v=>'$'+fmt(v)}},x:{grid:{display:false}}}},
  });
}

function renderBud(){
  const now=new Date();const txs=txMonth(now.getFullYear(),now.getMonth()+1);const s=stats(txs);
  document.getElementById('bud-list').innerHTML=cats().map(c=>{
    const bud=budgetGet(c.id);const sp=s.byCat[c.id]||0;
    const pct=bud>0?Math.min(sp/bud*100,100):0;
    const over=bud>0&&sp>bud;const near=bud>0&&!over&&pct>=80;
    return `<div class="bitem">
      <div class="bhdr">
        <span class="bcat">${c.name}</span>
        <input type="number" class="binput" value="${bud||''}" placeholder="設定預算"
          onchange="saveBud('${c.id}',this.value)" onfocus="this.select()">
      </div>
      ${bud>0?`<div class="bamts">已用 $${fmt(sp)} / $${fmt(bud)}</div>
        <div class="bbar"><div class="bfill${over?' d':near?' w':''}" style="width:${pct}%"></div></div>
        ${over?`<div class="bwarn d">⚠️ 超支 $${fmt(sp-bud)}</div>`:near?`<div class="bwarn w">🔔 已用 ${Math.round(pct)}%</div>`:''}`
      :`<div style="font-size:.72rem;color:var(--t3);margin-top:4px">本月：$${fmt(sp)}（未設預算）</div>`}
    </div>`;
  }).join('');
}

function saveBud(id,v){budgetSet(id,parseInt(v)||0);renderBud();toast('預算已儲存')}

function sw(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');el.classList.add('on');
}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

init();
</script>
</body>
</html>
