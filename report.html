<header class="hdr">
  <div><h1>📊 報表分析</h1><div class="hdr-sub" id="range-lbl">本月</div></div>
  <a href="./settings.html" class="hdr-btn">⚙️</a>
</header>

<div class="w">
  <div class="range-card">
    <div class="range-t">📅 日期區間</div>
    <div class="date-row">
      <input type="date" class="fc" id="df">
      <span style="color:var(--t3);flex-shrink:0">→</span>
      <input type="date" class="fc" id="dt">
    </div>
    <div class="preset-row">
      <button class="pb" onclick="preset('month')">本月</button>
      <button class="pb" onclick="preset('30')">近30天</button>
      <button class="pb" onclick="preset('q')">近3月</button>
      <button class="btn-q" onclick="load()">查詢</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('ov',this)">📈 總覽</button>
    <button class="tab" onclick="sw('cat',this)">🏷️ 分類</button>
    <button class="tab" onclick="sw('mon',this)">📅 月份</button>
    <button class="tab" onclick="sw('bud',this)">🎯 預算</button>
  </div>

  <div class="panel on" id="p-ov">
    <div class="sg4">
      <div class="sc4"><div class="v" id="ov-t">$0</div><div class="l">💰 總支出</div></div>
      <div class="sc4"><div class="v" id="ov-n">0</div><div class="l">📋 筆數</div></div>
      <div class="sc4"><div class="v" id="ov-cd">$0</div><div class="l">💳 信用卡</div></div>
      <div class="sc4"><div class="v" id="ov-cs">$0</div><div class="l">💵 現金</div></div>
    </div>
    <div class="chart-card">
      <div class="ct">付款方式比例</div>
      <div class="rbar"><div class="rf-c" id="rbar-c" style="width:50%"></div><div class="rf-cc"></div></div>
      <div class="rlbls"><span>💵 現金 <strong id="rp-c">0%</strong></span><span>💳 信用卡 <strong id="rp-cc">0%</strong></span></div>
    </div>
    <div class="chart-card">
      <div class="ct">信用卡各卡消費</div>
      <div id="cb-list"></div>
    </div>
    <div class="chart-card">
      <div class="ct">👥 雙人消費</div>
      <div class="chart-wrap" style="height:200px"><canvas id="person-c"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-cat">
    <div class="chart-card">
      <div class="ct">分類支出</div>
      <div class="chart-wrap"><canvas id="pie-c"></canvas></div>
      <div class="legend" id="pie-leg"></div>
    </div>
    <!-- 分類明細下鑽 -->
    <div id="cat-drill" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <button onclick="closeDrill()" style="background:var(--card);border:1.5px solid var(--border);color:var(--t2);padding:7px 14px;border-radius:50px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit">← 返回</button>
        <div id="drill-title" style="font-size:1rem;font-weight:700"></div>
      </div>
      <div id="drill-list"></div>
    </div>
  </div>

  <div class="panel" id="p-mon">
    <div class="chart-card">
      <div class="ct">每月支出趨勢</div>
      <div class="chart-wrap"><canvas id="bar-c"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-bud">
    <div style="font-size:.78rem;color:var(--t2);margin-bottom:12px">輸入金額後自動儲存（本月數據）</div>
    <div id="bud-list"></div>
  </div>
</div>

</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
Chart.defaults.color='#8896b3';
Chart.defaults.font.family="'Noto Sans TC',sans-serif";
const COLS=['#00e5b4','#4f8ef7','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#84cc16','#f97316','#94a3b8'];
let pieC=null,barC=null,personC=null,txData=[];

function init(){applyTheme();preset('month');load();}

function preset(t){
  const now=new Date();let f,e;
  if(t==='month'){f=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(t==='30'){f=new Date(now-30*864e5);e=now;}
  else{f=new Date(now.getFullYear(),now.getMonth()-2,1);e=now;}
  document.getElementById('df').value=f.toISOString().slice(0,10);
  document.getElementById('dt').value=e.toISOString().slice(0,10);
}

function load(){
  const f=document.getElementById('df').value,e=document.getElementById('dt').value;
  if(!f||!e){toast('請選擇日期','warn');return;}
  txData=txByRange(f,e);
  document.getElementById('range-lbl').textContent=`${f} ～ ${e}（${txData.length}筆）`;
  renderOv();renderPie();renderBar();renderBud();
}

function renderOv(){
  const s=calcStats(txData);
  document.getElementById('ov-t').textContent='$'+fmt(s.total);
  document.getElementById('ov-n').textContent=txData.length;
  document.getElementById('ov-cd').textContent='$'+fmt(s.card);
  document.getElementById('ov-cs').textContent='$'+fmt(s.cash);
  const cp=s.total>0?Math.round(s.cash/s.total*100):0;
  document.getElementById('rbar-c').style.width=cp+'%';
  document.getElementById('rp-c').textContent=cp+'%';
  document.getElementById('rp-cc').textContent=(100-cp)+'%';
  const el=document.getElementById('cb-list');
  if(!Object.keys(s.byCard).length){el.innerHTML='<div style="color:var(--t3);font-size:.84rem;text-align:center;padding:8px">無信用卡消費</div>';}
  else{el.innerHTML=Object.entries(s.byCard).sort((a,b)=>b[1]-a[1]).map(([cid,amt])=>{
    const c=cardFind(cid);const pct=s.card>0?Math.round(amt/s.card*100):0;
    return `<div class="cb-item" onclick="drillCard('${cid}')" style="cursor:pointer;transition:.15s;border-radius:var(--rs);padding:8px" onmouseenter="this.style.background='var(--card2)'" onmouseleave="this.style.background=''">
      <div class="cb-hdr" style="justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:700">${c?c.name:cid}</span>
          <span style="font-size:.8rem;color:var(--t3)">···${c?.last4||'0000'}</span>
        </div>
        <span style="font-weight:900;color:var(--blue)">$${fmt(amt)}</span>
        <span style="color:var(--t3);margin-left:4px;font-size:.8rem">›</span>
      </div>
      <div class="cb-bar" style="margin-top:6px"><div class="cb-fill" style="width:${pct}%;background:${c?.color||'var(--blue)'};height:6px;border-radius:3px"></div></div>
      <div style="font-size:.7rem;color:var(--t3);margin-top:4px;text-align:right">${pct}%</div>
    </div>`;
  }).join('');}
  if(personC)personC.destroy();
  const p1=s.byPerson['宏龍']||0,p2=s.byPerson['盈慧']||0;
  personC=new Chart(document.getElementById('person-c'),{type:'doughnut',
    data:{labels:['宏龍','盈慧'],datasets:[{data:[p1,p2],backgroundColor:['#00e5b4','#4f8ef7'],borderColor:'#1a2235',borderWidth:3}]},
    options:{cutout:'65%',plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>`$${fmt(c.raw)} (${Math.round(c.raw/(p1+p2||1)*100)}%)`}}}}});
}

function renderPie(){
  const s=calcStats(txData);const ent=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1]);
  if(pieC)pieC.destroy();
  if(!ent.length){document.getElementById('pie-leg').innerHTML='<div class="empty"><div class="ei">📊</div><p>無資料</p></div>';return;}
  const labs=ent.map(([id])=>catName(id)),vals=ent.map(([,v])=>v),cols=ent.map(([id],i)=>catFind(id).color||COLS[i%COLS.length]);
  pieC=new Chart(document.getElementById('pie-c'),{type:'doughnut',
    data:{labels:labs,datasets:[{data:vals,backgroundColor:cols,borderColor:'#1a2235',borderWidth:3}]},
    options:{cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`$${fmt(c.raw)} (${Math.round(c.raw/(s.total||1)*100)}%)`}}}}});
  document.getElementById('pie-leg').innerHTML=ent.map(([id,amt],i)=>{
    const pct=s.total>0?Math.round(amt/s.total*100):0;
    return `<div class="li" onclick="drillCat('${id}')" style="cursor:pointer;transition:.15s" onmouseenter="this.style.background='var(--card2)'" onmouseleave="this.style.background=''">
      <div class="ldot" style="background:${cols[i]}"></div>
      <span class="lname">${catName(id)}</span>
      <span class="lpct">${pct}%</span>
      <span class="lamt">$${fmt(amt)}</span>
      <span style="color:var(--t3);margin-left:4px;font-size:.8rem">›</span>
    </div>`;
  }).join('');
}

// ── 分類下鑽明細 ──────────────────────────────────────
function drillCat(catId) {
  const txs = txData.filter(t => t.cat === catId);
  const total = txs.reduce((s,t)=>s+t.amount,0);
  const cat = catFind(catId);

  document.getElementById('cat-drill').style.display = 'block';
  document.querySelector('#p-cat .chart-card').style.display = 'none';
  document.getElementById('drill-title').innerHTML =
    `${cat.name} <span style="color:var(--p);font-weight:900">$${fmt(total)}</span> <span style="font-size:.75rem;color:var(--t3)">${txs.length}筆</span>`;

  // 第一層：子分類統計
  const subMap = {};
  txs.forEach(t=>{
    const k = t.subCat||'（未分類）';
    if(!subMap[k]) subMap[k]={total:0,list:[]};
    subMap[k].total += t.amount;
    subMap[k].list.push(t);
  });
  const subEnts = Object.entries(subMap).sort((a,b)=>b[1].total-a[1].total);

  const payIcon = p => p==='card'?'💳':p==='icard'?'🎫':'💵';

  document.getElementById('drill-list').innerHTML =
    `<div style="margin-bottom:12px;font-size:.78rem;color:var(--t3)">點子分類查看明細 👇</div>` +
    subEnts.map(([sub,data])=>{
      const pct = total>0?Math.round(data.total/total*100):0;
      return `<div class="li" onclick="drillSubCat('${catId}','${sub}')"
        style="cursor:pointer;transition:.15s;border-radius:var(--rs);margin-bottom:6px;padding:10px 12px;background:var(--card)"
        onmouseenter="this.style.background='var(--card2)'" onmouseleave="this.style.background='var(--card)'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <span style="font-weight:700;font-size:.9rem">${sub}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.75rem;color:var(--t3)">${data.list.length}筆</span>
            <span style="font-weight:900;color:var(--danger)">-$${fmt(data.total)}</span>
            <span style="color:var(--t3);font-size:.8rem">›</span>
          </div>
        </div>
        <div style="height:4px;background:var(--border);border-radius:2px">
          <div style="height:4px;width:${pct}%;background:var(--p);border-radius:2px;transition:.3s"></div>
        </div>
        <div style="font-size:.7rem;color:var(--t3);margin-top:3px">${pct}%</div>
      </div>`;
    }).join('');
}

function drillSubCat(catId, subName) {
  const allTxs = txData.filter(t=>t.cat===catId);
  const txs = subName==='（未分類）'
    ? allTxs.filter(t=>!t.subCat)
    : allTxs.filter(t=>t.subCat===subName);
  const total = txs.reduce((s,t)=>s+t.amount,0);
  const cat = catFind(catId);

  // 更新標題加上返回上層按鈕
  document.getElementById('drill-title').innerHTML =
    `<span onclick="drillCat('${catId}')" style="cursor:pointer;color:var(--t3);font-size:.85rem;margin-right:6px">← ${cat.name}</span>
     ${subName} <span style="color:var(--p);font-weight:900">$${fmt(total)}</span> <span style="font-size:.75rem;color:var(--t3)">${txs.length}筆</span>`;

  // 第二層：按日期分組的明細
  const groups = {};
  [...txs].sort((a,b)=>new Date(b.at)-new Date(a.at)).forEach(t=>{
    const d = fmtD(t.at); if(!groups[d]) groups[d]=[];
    groups[d].push(t);
  });

  const payIcon = p => p==='card'?'💳':p==='icard'?'🎫':'💵';
  document.getElementById('drill-list').innerHTML = Object.entries(groups).map(([day,list])=>{
    const dayTotal = list.reduce((s,t)=>s+t.amount,0);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--t3);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:6px">
        <span>📅 ${day}</span><span>-$${fmt(dayTotal)}</span>
      </div>
      ${list.map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,53,80,.3)">
          <div style="width:36px;height:36px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0">${payIcon(t.pay)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.detail||catName(t.cat)}</div>
            <div style="font-size:.7rem;color:var(--t3);margin-top:2px">${t.person} · ${fmtT(t.at)}</div>
          </div>
          <div style="font-size:.92rem;font-weight:900;color:#ff6b82;flex-shrink:0">-$${fmt(t.amount)}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function drillCard(cardId) {
  const card = cardFind(cardId)||{name:'信用卡',last4:'????'};
  // 用當前日期範圍篩選交易（同 renderReport 的邏輯）
  const allTxs = getTx();
  const filtered = allTxs.filter(t=>{
    const d = new Date(t.at);
    return d >= d1 && d <= d2;
  });
  const txs = filtered.filter(t=>t.pay==='card'&&t.cardId===cardId);
  const total = txs.reduce((s,t)=>s+t.amount,0);

  // 複用 cat-drill 區塊，切換到分類頁
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-cat').classList.add('on');
  // 找分類頁籤按鈕並標記 on
  document.querySelectorAll('.tab-btn').forEach(b=>{if(b.textContent.includes('分類'))b.classList.add('on');});

  document.querySelector('#p-cat .chart-card').style.display='none';
  document.getElementById('cat-drill').style.display='block';
  document.getElementById('drill-title').innerHTML=
    `💳 ${card.name}···${card.last4} <span style="color:var(--blue);font-weight:900">$${fmt(total)}</span> <span style="font-size:.75rem;color:var(--t3)">${txs.length}筆</span>`;

  const sorted=[...txs].sort((a,b)=>new Date(b.at)-new Date(a.at));
  const groups={};
  sorted.forEach(t=>{const d=fmtD(t.at);if(!groups[d])groups[d]=[];groups[d].push(t);});

  document.getElementById('drill-list').innerHTML=Object.entries(groups).map(([day,list])=>{
    const dayTotal=list.reduce((s,t)=>s+t.amount,0);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--t3);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:6px">
        <span>📅 ${day}</span><span>-$${fmt(dayTotal)}</span>
      </div>
      ${list.map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,53,80,.3)">
          <div style="width:36px;height:36px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0">${catFind(t.cat).name.slice(0,2)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.detail||catName(t.cat)}</div>
            <div style="font-size:.7rem;color:var(--t3);margin-top:2px">${catName(t.cat)} ${t.person} ${fmtT(t.at)}</div>
          </div>
          <div style="font-size:.92rem;font-weight:900;color:var(--blue);flex-shrink:0">-$${fmt(t.amount)}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function closeDrill() {
  document.getElementById('cat-drill').style.display = 'none';
  document.querySelector('#p-cat .chart-card').style.display = 'block';
}

function renderBar(){
  const all=getTx();const mm={};
  all.forEach(t=>{const d=new Date(t.at);const k=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;mm[k]=(mm[k]||0)+t.amount;});
  const ks=Object.keys(mm).sort().slice(-12),vs=ks.map(k=>mm[k]);
  if(barC)barC.destroy();
  barC=new Chart(document.getElementById('bar-c'),{type:'bar',
    data:{labels:ks.map(k=>k.slice(2)),datasets:[{data:vs,backgroundColor:ks.map((_,i)=>i===ks.length-1?'rgba(0,229,180,.7)':'rgba(79,142,247,.35)'),borderColor:ks.map((_,i)=>i===ks.length-1?'#00e5b4':'#4f8ef7'),borderWidth:1.5,borderRadius:8}]},
    options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(42,53,80,.5)'},ticks:{callback:v=>'$'+fmt(v)}},x:{grid:{display:false}}}}});
}

function renderBud(){
  const now=new Date();const txs=txByMonth(now.getFullYear(),now.getMonth()+1);const s=calcStats(txs);
  document.getElementById('bud-list').innerHTML=getCats().map(c=>{
    const bud=getBudget(c.id),sp=s.byCat[c.id]||0;
    const pct=bud>0?Math.min(sp/bud*100,100):0,over=bud>0&&sp>bud,near=bud>0&&!over&&pct>=80;
    return `<div class="bitem"><div class="bhdr"><span class="bcat">${c.name}</span>
      <input type="number" class="binput" value="${bud||''}" placeholder="設定預算" onchange="saveBud('${c.id}',this.value)" onfocus="this.select()"></div>
      ${bud>0?`<div class="bamts">已用 $${fmt(sp)} / $${fmt(bud)}</div><div class="bbar"><div class="bfill${over?' d':near?' w':''}" style="width:${pct}%"></div></div>${over?`<div class="bwarn d">⚠️ 超支 $${fmt(sp-bud)}</div>`:near?`<div class="bwarn w">🔔 已用 ${Math.round(pct)}%</div>`:''}`:`<div style="font-size:.72rem;color:var(--t3);margin-top:4px">本月：$${fmt(sp)}（未設預算）</div>`}
    </div>`;
  }).join('');
}

function saveBud(id,v){setBudget(id,parseInt(v)||0);renderBud();toast('預算已儲存');}
function sw(id,el){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');el.classList.add('on');}

let _tt;
