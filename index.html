<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>家庭記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--bg2:#111827;--card:#1a2235;--card2:#202d42;--border:#2a3550;
  --p:#00e5b4;--p2:#00b48e;--pdim:rgba(0,229,180,.13);
  --blue:#4f8ef7;--bdim:rgba(79,142,247,.13);
  --warn:#f59e0b;--danger:#f43f5e;--ok:#22c55e;
  --t:#e8edf8;--t2:#8896b3;--t3:#4a5670;
  --r:16px;--rs:10px;--nav:68px;--ease:.18s cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px));overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit;-webkit-tap-highlight-color:transparent}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);font-size:.64rem;font-weight:700;letter-spacing:.04em;position:relative;-webkit-tap-highlight-color:transparent}
.ni .ic{font-size:1.45rem;line-height:1}
.ni.on{color:var(--p)}
.ni.on::after{content:'';position:absolute;top:0;left:22%;right:22%;height:2px;background:var(--p);border-radius:0 0 3px 3px}
.ni-add{flex:0 0 70px}
.ni-add .fab{width:50px;height:50px;margin-top:-10px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.55rem;box-shadow:0 4px 18px rgba(0,229,180,.45);transition:var(--ease)}
.ni-add:active .fab{transform:scale(.9)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:1.2rem;font-weight:900;letter-spacing:-.01em}
.hdr-sub{font-size:.72rem;color:var(--t2);margin-top:1px}
.hdr-btn{background:var(--pdim);color:var(--p);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem}

/* WRAP */
.w{padding:14px}

/* MONTH */
.mrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.mbtn{background:var(--card);border:1.5px solid var(--border);color:var(--t2);width:38px;height:38px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--ease)}
.mbtn:active{background:var(--card2);transform:scale(.92)}
.mlbl{font-size:1rem;font-weight:800;min-width:108px;text-align:center}

/* HERO */
.hero{background:linear-gradient(150deg,#0c2640,#091a2e);border:1px solid #1c3a58;border-radius:var(--r);padding:20px 18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,229,180,.1),transparent 65%);pointer-events:none}
.hero-lbl{font-size:.7rem;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.hero-amt{font-size:3rem;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--t)}
.hero-amt .cur{font-size:1.2rem;font-weight:500;color:var(--t2);margin-right:2px}
.hero-sub{display:flex;gap:14px;margin-top:10px;font-size:.82rem;color:var(--t2)}
.hero-sub b{color:var(--t);font-weight:700}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 11px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.g::before{background:var(--p)}.sc.b::before{background:var(--blue)}.sc.w::before{background:var(--warn)}
.sc-lbl{font-size:.63rem;color:var(--t2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.sc-val{font-size:1.25rem;font-weight:900;letter-spacing:-.03em;line-height:1}
.sc-val .u{font-size:.68rem;font-weight:400;color:var(--t2);margin-right:1px}

/* PILLS */
.pills{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:7px 16px;border-radius:50px;background:var(--card);border:1.5px solid var(--border);color:var(--t2);font-size:.8rem;font-weight:700;cursor:pointer;transition:var(--ease);font-family:inherit}
.pill.on{background:var(--pdim);border-color:var(--p);color:var(--p)}
.pill:active{transform:scale(.95)}

/* TX */
.day-h{display:flex;justify-content:space-between;padding:12px 2px 7px}
.day-d{font-size:.78rem;font-weight:700;color:var(--t2);letter-spacing:.05em}
.day-t{font-size:.8rem;font-weight:700;color:var(--t2)}
.tx{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;transition:var(--ease);cursor:pointer;-webkit-tap-highlight-color:transparent}
.tx:active{background:var(--card2);transform:scale(.99)}
.tx-ic{width:44px;height:44px;border-radius:11px;background:var(--pdim);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.tx-ic.b{background:var(--bdim)}.tx-ic.w{background:rgba(245,158,11,.14)}.tx-ic.pk{background:rgba(236,72,153,.14)}.tx-ic.pu{background:rgba(139,92,246,.14)}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.tag{background:var(--bg2);color:var(--t2);font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:5px}
.tx-del{background:rgba(244,63,94,.12);color:var(--danger);border-radius:6px;padding:3px 9px;font-size:.7rem;font-weight:700;margin-top:5px;cursor:pointer;border:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
.tx-r{text-align:right;flex-shrink:0}
.tx-amt{font-size:.98rem;font-weight:900;color:#ff6b82;letter-spacing:-.02em}
.tx-time{font-size:.66rem;color:var(--t3);margin-top:3px}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.empty .ei{font-size:3rem;margin-bottom:8px}
.empty p{font-size:.88rem;line-height:1.6}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ok);color:#fff;padding:11px 26px;border-radius:50px;font-size:.88rem;font-weight:700;z-index:9999;transition:transform .32s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}.toast.warn{background:var(--warn)}.toast.info{background:var(--blue)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.ov.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:18px 18px 34px;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.ov.show .sheet{transform:translateY(0)}
.sh{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.st{font-size:1rem;font-weight:800;margin-bottom:12px}
.btn-row{display:flex;gap:9px}
.btn{width:100%;padding:15px;border-radius:var(--r);font-size:1rem;font-weight:800;font-family:inherit;transition:var(--ease);cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#000;box-shadow:0 4px 16px rgba(0,229,180,.28)}
.btn-p:active{transform:scale(.98);box-shadow:none}
.btn-s{background:var(--card);color:var(--t2);border:1.5px solid var(--border)}
.btn-s:active{background:var(--card2)}
.btn-d{background:rgba(244,63,94,.14);color:var(--danger);border:1.5px solid rgba(244,63,94,.28)}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <h1>🏡 家庭記帳</h1>
    <div class="hdr-sub" id="hdr-date"></div>
  </div>
  <a href="settings.html" class="hdr-btn">⚙️</a>
</header>

<div class="w">
  <div class="mrow">
    <button class="mbtn" onclick="prevM()">‹</button>
    <div class="mlbl" id="mlbl"></div>
    <button class="mbtn" onclick="nextM()">›</button>
  </div>

  <div class="hero">
    <div class="hero-lbl">📅 本月總支出</div>
    <div class="hero-amt"><span class="cur">$</span><span id="h-t">0</span></div>
    <div class="hero-sub">
      <span>💳 信用卡 <b id="h-cc">0</b></span>
      <span>💵 現金 <b id="h-cs">0</b></span>
    </div>
  </div>

  <div class="sg">
    <div class="sc g"><div class="sc-lbl">👛 錢包</div><div class="sc-val"><span class="u">$</span><span id="s-w">0</span></div></div>
    <div class="sc b"><div class="sc-lbl">🙋 宏龍</div><div class="sc-val"><span class="u">$</span><span id="s-1">0</span></div></div>
    <div class="sc w"><div class="sc-lbl">🙋‍♀️ 盈慧</div><div class="sc-val"><span class="u">$</span><span id="s-2">0</span></div></div>
  </div>

  <div class="pills">
    <button class="pill on" onclick="setF('all',this)">全部</button>
    <button class="pill" onclick="setF('宏龍',this)">宏龍</button>
    <button class="pill" onclick="setF('盈慧',this)">盈慧</button>
    <button class="pill" onclick="setF('cash',this)">💵 現金</button>
    <button class="pill" onclick="setF('card',this)">💳 信用卡</button>
  </div>

  <div id="list"></div>
</div>

<nav class="nav">
  <a class="ni on" href="index.html"><span class="ic">🏠</span><span>首頁</span></a>
  <a class="ni" href="report.html"><span class="ic">📊</span><span>報表</span></a>
  <a class="ni ni-add" href="add.html"><div class="fab">➕</div></a>
  <a class="ni" href="wallet.html"><span class="ic">👛</span><span>錢包</span></a>
  <a class="ni" href="settings.html"><span class="ic">⚙️</span><span>設定</span></a>
</nav>

<div class="toast" id="toast"></div>
<div class="ov" id="modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="m-title"></div>
    <p id="m-msg" style="color:var(--t2);font-size:.88rem;margin-bottom:18px;line-height:1.6"></p>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeM()">取消</button>
      <button class="btn btn-d" id="m-ok">確認刪除</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  資料層（完全內嵌）
// ═══════════════════════════════════════
const DB={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))},
};

const DEF_CATS=[
  {id:'food',name:'🍜 餐飲',color:'#10b981',sub:['早餐','午餐','晚餐','飲料','零食','聚餐']},
  {id:'transport',name:'🚌 交通',color:'#3b82f6',sub:['加油','捷運/公車','停車費','計程車']},
  {id:'shopping',name:'🛍️ 購物',color:'#f59e0b',sub:['服飾','3C','日用品','網購']},
  {id:'home',name:'🏠 居家',color:'#ec4899',sub:['房租','水費','電費','瓦斯','網路']},
  {id:'medical',name:'💊 醫療',color:'#8b5cf6',sub:['掛號','藥費','健檢','牙科']},
  {id:'entertain',name:'🎬 娛樂',color:'#06b6d4',sub:['電影','遊戲','訂閱','旅遊']},
  {id:'education',name:'📚 教育',color:'#84cc16',sub:['學費','補習','課程']},
  {id:'child',name:'👶 育兒',color:'#f97316',sub:['奶粉','玩具','衣物','托育']},
  {id:'other',name:'📦 其他',color:'#94a3b8',sub:['禮金','捐款','雜費']},
];
const DEF_CARDS=[
  {id:'c1',name:'國泰世華',last4:'1234',color:'#1d4ed8'},
  {id:'c2',name:'台新玫瑰',last4:'5678',color:'#be185d'},
  {id:'c3',name:'中信鈦金',last4:'9012',color:'#374151'},
];

function initDB(){
  if(!DB.get('cats'))  DB.set('cats', DEF_CATS);
  if(!DB.get('cards')) DB.set('cards',DEF_CARDS);
  if(!DB.get('wal'))   DB.set('wal',  {balance:0,history:[]});
  if(!DB.get('bud'))   DB.set('bud',  {});
  if(!DB.get('tx'))    DB.set('tx',   makeDemo());
}

// 交易
function getTx()       { return DB.get('tx')||[]; }
function addTx(tx){
  const list=getTx();
  tx.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  tx.at=tx.at||new Date().toISOString();
  list.unshift(tx); DB.set('tx',list);
  if(tx.pay==='cash') walOut(tx.amount, tx.detail||catName(tx.cat));
  return tx;
}
function delTx(id){
  const list=getTx(); const tx=list.find(t=>t.id===id);
  DB.set('tx',list.filter(t=>t.id!==id));
  if(tx&&tx.pay==='cash') walIn(tx.amount,'刪除還原');
}
function txByMonth(y,m){ return getTx().filter(t=>{const d=new Date(t.at);return d.getFullYear()===y&&d.getMonth()+1===m}); }
function txByRange(f,e){ const s=new Date(f),en=new Date(e);en.setHours(23,59,59);return getTx().filter(t=>{const d=new Date(t.at);return d>=s&&d<=en}); }

// 錢包
function getWal()      { return DB.get('wal')||{balance:0,history:[]}; }
function walIn(n,note){ const w=getWal();w.balance+=n;w.history.unshift({type:'in',amount:n,note,time:new Date().toISOString()});DB.set('wal',w); }
function walOut(n,note){ const w=getWal();w.balance=Math.max(0,w.balance-n);w.history.unshift({type:'out',amount:n,note,time:new Date().toISOString()});DB.set('wal',w); }

// 分類
function getCats()     { return DB.get('cats')||DEF_CATS; }
function catFind(id)   { return getCats().find(c=>c.id===id)||{name:id,color:'#94a3b8',sub:[]}; }
function catName(id)   { return catFind(id).name; }
function addCat(c)     { const list=getCats();c.id='cat_'+Date.now().toString(36);list.push(c);DB.set('cats',list); }

// 信用卡
function getCards()    { return DB.get('cards')||DEF_CARDS; }
function cardFind(id)  { return getCards().find(c=>c.id===id)||null; }
function addCard(c)    { const list=getCards();c.id='cc_'+Date.now().toString(36);list.push(c);DB.set('cards',list); }
function delCard(id)   { DB.set('cards',getCards().filter(c=>c.id!==id)); }

// 預算
function getBud()      { return DB.get('bud')||{}; }
function getBudget(id) { return getBud()[id]||0; }
function setBudget(id,n){ const b=getBud();b[id]=n;DB.set('bud',b); }

// 統計
function calcStats(list){
  const t=list.reduce((s,x)=>s+x.amount,0);
  const cash=list.filter(x=>x.pay==='cash').reduce((s,x)=>s+x.amount,0);
  const card=list.filter(x=>x.pay==='card').reduce((s,x)=>s+x.amount,0);
  const byCat={},byCard={},byPerson={};
  list.forEach(x=>{
    byCat[x.cat]=(byCat[x.cat]||0)+x.amount;
    byPerson[x.person]=(byPerson[x.person]||0)+x.amount;
    if(x.pay==='card'&&x.cardId) byCard[x.cardId]=(byCard[x.cardId]||0)+x.amount;
  });
  return {total:t,cash,card,byCat,byCard,byPerson};
}

// 格式化
function fmt(n)  { return Number(n).toLocaleString('zh-TW'); }
function fmtT(s) { const d=new Date(s);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtD(s) { const d=new Date(s);return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function groupDay(list){
  const g={};
  [...list].sort((a,b)=>new Date(b.at)-new Date(a.at)).forEach(t=>{const k=fmtD(t.at);if(!g[k])g[k]=[];g[k].push(t)});
  return g;
}

// 示範資料
function makeDemo(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const mk=(cat,detail,amount,pay,cardId,person,day,h,mi)=>({
    id:Date.now().toString(36)+Math.random().toString(36).slice(2),
    cat,detail,amount,pay,cardId:cardId||null,person,
    at:new Date(y,m,day,h,mi).toISOString(),subCat:''
  });
  return [
    mk('food','早餐豆漿油條',65,'cash',null,'宏龍',1,8,30),
    mk('food','家樂福採購',1280,'card','c1','盈慧',1,11,20),
    mk('transport','捷運悠遊卡',500,'cash',null,'宏龍',2,9,0),
    mk('food','晚餐火鍋',850,'card','c2','宏龍',3,18,45),
    mk('child','寶寶奶粉',1200,'card','c1','盈慧',4,14,10),
    mk('entertain','Netflix',330,'card','c2','宏龍',5,10,0),
    mk('medical','兒科掛號',200,'cash',null,'盈慧',6,15,30),
    mk('shopping','運動上衣',680,'card','c1','盈慧',8,13,20),
    mk('home','電費帳單',1450,'card','c3','宏龍',9,10,0),
    mk('education','英文補習費',3000,'card','c1','盈慧',12,9,0),
    mk('child','幼稚園費用',8000,'card','c3','盈慧',14,9,0),
  ];
}

initDB();

// ═══════════════════════════════════════
//  頁面邏輯
// ═══════════════════════════════════════
const CAT_IC={food:'🍜',transport:'🚌',shopping:'🛍️',home:'🏠',medical:'💊',entertain:'🎬',education:'📚',child:'👶',other:'📦'};
const CAT_CL={food:'',transport:'b',shopping:'w',home:'pk',medical:'pu',entertain:'b',education:'',child:'w',other:''};
const MN=['一','二','三','四','五','六','七','八','九','十','十一','十二'];

let cy=new Date().getFullYear(), cm=new Date().getMonth()+1, filt='all';

function render(){
  document.getElementById('mlbl').textContent=`${cy} 年 ${MN[cm-1]} 月`;
  let list=txByMonth(cy,cm);
  const s=calcStats(list);
  document.getElementById('h-t').textContent=fmt(s.total);
  document.getElementById('h-cc').textContent=fmt(s.card);
  document.getElementById('h-cs').textContent=fmt(s.cash);
  document.getElementById('s-w').textContent=fmt(getWal().balance);
  document.getElementById('s-1').textContent=fmt(s.byPerson['宏龍']||0);
  document.getElementById('s-2').textContent=fmt(s.byPerson['盈慧']||0);

  if(filt==='宏龍'||filt==='盈慧') list=list.filter(t=>t.person===filt);
  else if(filt==='cash') list=list.filter(t=>t.pay==='cash');
  else if(filt==='card') list=list.filter(t=>t.pay==='card');

  const el=document.getElementById('list');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="ei">📭</div><p>還沒有記帳資料<br>點下方 ➕ 開始記帳</p></div>';
    return;
  }
  const g=groupDay(list);
  el.innerHTML=Object.entries(g).map(([d,ts])=>{
    const dt=ts.reduce((s,t)=>s+t.amount,0);
    return `<div class="day-h"><span class="day-d">📅 ${d}</span><span class="day-t">-$${fmt(dt)}</span></div>`
      +ts.map(txHTML).join('');
  }).join('');
}

function txHTML(t){
  const ic=CAT_IC[t.cat]||'📦';
  const cl=CAT_CL[t.cat]||'';
  const pay=t.pay==='cash'?'💵 現金':`💳 ${cardFind(t.cardId)?.name||'信用卡'}`;
  return `<div class="tx">
    <div class="tx-ic ${cl}">${ic}</div>
    <div class="tx-body">
      <div class="tx-name">${t.detail||catName(t.cat)}</div>
      <div class="tx-meta">
        <span class="tag">${catName(t.cat)}</span>
        <span class="tag">${t.person}</span>
        <span class="tag">${pay}</span>
      </div>
      <button class="tx-del" onclick="askDel('${t.id}',event)">刪除</button>
    </div>
    <div class="tx-r">
      <div class="tx-amt">-$${fmt(t.amount)}</div>
      <div class="tx-time">${fmtT(t.at)}</div>
    </div>
  </div>`;
}

function setF(f,el){
  filt=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  render();
}
function prevM(){cm--;if(cm<1){cm=12;cy--}render()}
function nextM(){cm++;if(cm>12){cm=1;cy++}render()}

// delete
let pendId=null;
function askDel(id,e){
  e.stopPropagation();pendId=id;
  document.getElementById('m-title').textContent='刪除這筆記帳？';
  document.getElementById('m-msg').textContent='刪除後不可復原。現金支出會歸還錢包。';
  document.getElementById('modal').classList.add('show');
  document.getElementById('m-ok').onclick=()=>{delTx(pendId);closeM();toast('已刪除','err');render()};
}
function closeM(){document.getElementById('modal').classList.remove('show')}

// toast
let _t;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),2300);
}

// init
document.getElementById('hdr-date').textContent=
  new Date().toLocaleDateString('zh-TW',{weekday:'long',month:'long',day:'numeric'});
render();

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
