</nav>
<div class="toast" id="toast"></div>
<!-- 編輯記帳 Modal -->
<div class="ov" id="edit-modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st">✏️ 編輯記帳</div>
    <div class="fg">
      <span class="flbl">💰 金額</span>
      <input type="number" class="fc" id="e-amt" inputmode="numeric">
    </div>
    <div class="fg">
      <span class="flbl">📅 日期時間</span>
      <input type="datetime-local" class="fc" id="e-dt">
    </div>
    <div class="fg">
      <span class="flbl">🏷️ 分類</span>
      <select class="fc" id="e-cat"></select>
    </div>
    <div class="fg">
      <span class="flbl">📂 子分類（可略）</span>
      <input type="text" class="fc" id="e-subcat" placeholder="例：早餐">
    </div>
    <div class="fg">
      <span class="flbl">📝 明細（可略）</span>
      <input type="text" class="fc" id="e-detail" placeholder="例：家樂福採購" maxlength="30">
    </div>
    <div class="fg">
      <span class="flbl">👤 記帳人</span>
      <div class="tg">
        <button class="tb" id="e-p-hl" onclick="setEP('宏龍',this)">🙋 宏龍</button>
        <button class="tb" id="e-p-yh" onclick="setEP('盈慧',this)">🙋‍♀️ 盈慧</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeEdit()">取消</button>
      <button class="btn btn-p" onclick="submitEdit()">💾 儲存</button>
    </div>
  </div>
</div>

<div class="ov" id="modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="m-title"></div>
    <p id="m-msg" style="color:var(--t2);font-size:.9rem;margin-bottom:18px;line-height:1.6"></p>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeM()">取消</button>
      <button class="btn btn-d" id="m-ok">確認刪除</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const CAT_IC={food:'🍜',transport:'🚌',shopping:'🛍️',home:'🏠',medical:'💊',entertain:'🎬',education:'📚',child:'👶',other:'📦'};
const CAT_CL={food:'',transport:'b',shopping:'w',home:'pk',medical:'pu',entertain:'b',education:'',child:'w',other:''};
const MN=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
let cy=new Date().getFullYear(), cm=new Date().getMonth()+1, filt='all';

function render() {
  document.getElementById('mlbl').textContent=`${cy} 年 ${MN[cm-1]} 月`;
  let list=txByMonth(cy,cm); const s=calcStats(list);
  document.getElementById('h-t').textContent=fmt(s.total);
  document.getElementById('h-cc').textContent=fmt(s.card);
  document.getElementById('h-cs').textContent=fmt(s.cash);
  document.getElementById('s-w').textContent=fmt(getWal().balance);
  document.getElementById('s-1').textContent=fmt(s.byPerson['宏龍']||0);
  document.getElementById('s-2').textContent=fmt(s.byPerson['盈慧']||0);
  if(filt==='宏龍'||filt==='盈慧') list=list.filter(t=>t.person===filt);
  else if(filt==='cash') list=list.filter(t=>t.pay==='cash');
  else if(filt==='card') list=list.filter(t=>t.pay==='card');
  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">📭</div><p>還沒有記帳<br>點 ➕ 開始記帳</p></div>';return;}
  const g=groupDay(list);
  el.innerHTML=Object.entries(g).map(([d,ts])=>{
    const dt=ts.reduce((s,t)=>s+t.amount,0);
    return `<div class="day-h"><span class="day-d">📅 ${d}</span><span class="day-t">-$${fmt(dt)}</span></div>`+ts.map(txHTML).join('');
  }).join('');
}

function txHTML(t) {
  const ic=CAT_IC[t.cat]||'📦', cl=CAT_CL[t.cat]||'';
  const pay=t.pay==='cash'?'💵 現金':`💳 ${cardFind(t.cardId)?.name||'信用卡'}`;
  return `<div class="tx"><div class="tx-ic ${cl}">${ic}</div>
    <div class="tx-body">
      <div class="tx-name">${t.detail||catName(t.cat)}</div>
      <div class="tx-meta"><span class="tag">${catName(t.cat)}</span><span class="tag">${t.person}</span><span class="tag">${pay}</span></div>
      <div style="display:flex;gap:6px;margin-top:5px">
        <button class="tx-del" style="background:var(--pdim);color:var(--p)" onclick="askEdit('${t.id}',event)">編輯</button>
        <button class="tx-del" onclick="askDel('${t.id}',event)">刪除</button>
      </div>
    </div>
    <div class="tx-r"><div class="tx-amt">-$${fmt(t.amount)}</div><div class="tx-time">${fmtT(t.at)}</div></div>
  </div>`;
}

function setF(f,el){filt=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');render();}
function prevM(){cm--;if(cm<1){cm=12;cy--}render();}
function nextM(){cm++;if(cm>12){cm=1;cy++}render();}

let editId = '';
let editPerson = '宏龍';

function askEdit(id, e) {
  e.stopPropagation();
  editId = id;
  const tx = getTx().find(t => t.id === id);
  if (!tx) return;

  // 填入現有資料
  document.getElementById('e-amt').value = tx.amount;
  // 日期
  const d = new Date(tx.at);
  document.getElementById('e-dt').value =
    new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  // 分類
  const catSel = document.getElementById('e-cat');
  catSel.innerHTML = getCats().map(c =>
    `<option value="${c.id}" ${c.id===tx.cat?'selected':''}>${c.name}</option>`
  ).join('');
  // 子分類、明細
  document.getElementById('e-subcat').value = tx.subCat || '';
  document.getElementById('e-detail').value = tx.detail || '';
  // 記帳人
  editPerson = tx.person || '宏龍';
  document.getElementById('e-p-hl').classList.toggle('on', editPerson==='宏龍');
  document.getElementById('e-p-yh').classList.toggle('on', editPerson==='盈慧');

  document.getElementById('edit-modal').classList.add('show');
}

function setEP(p, el) {
  editPerson = p;
  document.querySelectorAll('#e-p-hl,#e-p-yh').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('show');
}

async function submitEdit() {
  const amt = parseInt(document.getElementById('e-amt').value) || 0;
  if (!amt) { toast('金額不可為 0', 'warn'); return; }

  const list = getTx();
  const idx  = list.findIndex(t => t.id === editId);
  if (idx < 0) return;

  const old = list[idx];
  const dtv = document.getElementById('e-dt').value;

  // 還原舊扣款
  if (old.pay === 'cash') walIn(old.amount, '編輯還原');
  if (old.pay === 'icard' && old.icardId) icardIn(old.icardId, old.amount, '編輯還原');

  // 更新資料
  list[idx] = {
    ...old,
    amount:  amt,
    cat:     document.getElementById('e-cat').value,
    subCat:  document.getElementById('e-subcat').value.trim(),
    detail:  document.getElementById('e-detail').value.trim(),
    person:  editPerson,
    at:      dtv ? new Date(dtv).toISOString() : old.at,
    editedAt: new Date().toISOString(),
  };
  DB.set('tx', list);

  // 重新扣款
  const updated = list[idx];
  if (updated.pay === 'cash') walOut(updated.amount, updated.detail || catName(updated.cat));
  if (updated.pay === 'icard' && updated.icardId) icardOut(updated.icardId, updated.amount, updated.detail || catName(updated.cat));

  // 同步 Firebase
  await fbAddTx(updated);
  fbSyncPersonal();

  closeEdit();
  render();
  toast('已儲存修改');
}

function askDel(id,e){
  e.stopPropagation();
  document.getElementById('m-title').textContent='刪除這筆記帳？';
  document.getElementById('m-msg').textContent='刪除後不可復原，現金支出會歸還錢包。';
  document.getElementById('modal').classList.add('show');
  document.getElementById('m-ok').onclick=()=>{delTx(id);fbDelTx(id);closeM();toast('已刪除','err');render();};
}
function closeM(){document.getElementById('modal').classList.remove('show');}

let _tt;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

applyTheme();
// 宏龍專屬功能顯示
if((localStorage.getItem('current_email')||'')==='kevin67222@gmail.com'){
  ['priv-btn','memo-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
}
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('zh-TW',{weekday:'long',month:'long',day:'numeric'});
render();
fbPullAll().then(()=>render());
fbListenTx(()=>render());
fbListenWal(()=>render());
scheduleDailyDiscord();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
