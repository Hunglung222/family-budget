    <div class="fg">
      <span class="flbl">👤 記帳人</span>

    </div>
    <div class="fg" id="card-fg" style="display:none">
      <span class="flbl">🃏 選擇信用卡</span>

      <div id="no-card-hint" style="display:none;font-size:.78rem;color:var(--warn);margin-top:6px">⚠️ 尚未設定信用卡，請至<a href="./wallet.html" style="color:var(--p)">錢包頁</a>新增</div>
    </div>
    <div class="fg" id="icard-fg" style="display:none">
      <span class="flbl">🎫 選擇悠遊卡</span>
      <div class="card-chips" id="icard-chips"></div>
      <div id="no-icard-hint" style="display:none;font-size:.78rem;color:var(--warn);margin-top:6px">⚠️ 尚未設定悠遊卡，請至<a href="./wallet.html" style="color:var(--p)">錢包頁</a>新增</div>

    <div style="margin-top:18px">
      <button class="btn btn-p" onclick="submit()">✅ 確定記帳</button>

        <button class="btn btn-s" onclick="resetForm()">🔄 繼續新增</button>

</div>

<script>
let astr='',selCat='',selCard='',selIcard='',pay='cash',person='宏龍';
let voiceRec=null,isListening=false;

function init(){
  applyTheme();
  const now=new Date();
  document.getElementById('tx-dt').value=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  // 依登入者預設記帳人
  person=currentUser();
  document.getElementById(person==='宏龍'?'p-hl':'p-yh').classList.add('on');
  // 套用上次偏好
  const p=getPrefs();
  pay=p.lastPay||'cash';
  document.getElementById('pay-'+pay).classList.add('on');
  if(pay==='card')  document.getElementById('card-fg').style.display='block';
  if(pay==='icard') document.getElementById('icard-fg').style.display='block';
  buildCatChips(); buildCardChips(); buildIcardChips();
  initVoice();
}

function buildCatChips(){
  const p=getPrefs();
  document.getElementById('cat-chips').innerHTML=getCats().map(c=>
    `<button class="cchip${selCat===c.id||p.lastCat===c.id&&!selCat?' on':''}" onclick="selC('${c.id}',this)">${c.name}</button>`
  ).join('');
  if(!selCat&&p.lastCat){selCat=p.lastCat;const el=document.querySelector('.cchip.on');if(el)triggerCatSub(p.lastCat);}
}

function triggerCatSub(id){
  const cat=catFind(id);const sf=document.getElementById('sub-fg');const ss=document.getElementById('sub-sel');
  if(cat.sub&&cat.sub.length){sf.style.display='block';ss.innerHTML='<option value="">子分類（可略）</option>'+cat.sub.map(s=>`<option>${s}</option>`).join('');}
  else sf.style.display='none';
}

function buildCardChips(){
  const cs=getCards();const el=document.getElementById('card-chips');const hint=document.getElementById('no-card-hint');
  if(!cs.length){el.innerHTML='';hint.style.display='block';selCard='';return;}
  hint.style.display='none';
  el.innerHTML=cs.map(c=>`<button class="cc" onclick="selCC('${c.id}',this)">${c.name} ···${c.last4}</button>`).join('');
  selCard=cs[0].id;el.querySelector('.cc').classList.add('on');
}

function buildIcardChips(){
  const cs=getIcards();const el=document.getElementById('icard-chips');const hint=document.getElementById('no-icard-hint');
  if(!cs.length){el.innerHTML='';hint.style.display='block';selIcard='';return;}
  hint.style.display='none';
  el.innerHTML=cs.map(c=>`<button class="cc" onclick="selIC('${c.id}',this)">${c.name} <span style="font-size:.75rem;opacity:.7">$${fmt(c.balance||0)}</span></button>`).join('');
  selIcard=cs[0].id;el.querySelector('.cc').classList.add('on');
}

function nk(n){if(astr.length>=7)return;astr+=String(n);refreshAmt();}
function nkd(){astr=astr.slice(0,-1);refreshAmt();}
function refreshAmt(){const v=parseInt(astr)||0;document.getElementById('aval').textContent=v>0?fmt(v):'0';document.getElementById('adisp').classList.toggle('has-val',v>0);}
function goStep2(){if(!(parseInt(astr)||0)){toast('請輸入金額','warn');return;}document.getElementById('s1').style.display='none';document.getElementById('s2').style.display='block';setStep(1);}

function selC(id,el){
  selCat=id;
  document.querySelectorAll('.cchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');
  triggerCatSub(id);
  showHints();
}
function onSubChange(){showHints();}

function setPay(p,el){
  pay=p;
  document.querySelectorAll('#pay-cash,#pay-card,#pay-icard').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('card-fg').style.display=p==='card'?'block':'none';
  document.getElementById('icard-fg').style.display=p==='icard'?'block':'none';
}
function setP(p,el){person=p;document.querySelectorAll('#p-hl,#p-yh').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function selCC(id,el){selCard=id;document.querySelectorAll('#card-chips .cc').forEach(c=>c.classList.remove('on'));el.classList.add('on');}
function selIC(id,el){selIcard=id;document.querySelectorAll('#icard-chips .cc').forEach(c=>c.classList.remove('on'));el.classList.add('on');}

// 智慧輸入提示
function showHints(){
  const inp=document.getElementById('tx-detail');const val=inp.value;
  const subCat=document.getElementById('sub-sel').value;
  let hints=selCat?getAllDetailHints(selCat):[];
  if(val) hints=hints.filter(h=>h.includes(val));
  const box=document.getElementById('hint-list');
  if(!hints.length){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=hints.map(h=>`<div onclick="pickHint('${h.replace(/'/g,"\\'")}')"`+
    ` style="padding:11px 14px;font-size:.88rem;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent">${h}</div>`).join('');
}
function hideHints(){document.getElementById('hint-list').style.display='none';}
function pickHint(v){document.getElementById('tx-detail').value=v;hideHints();}

// ── Gemini AI 語音辨識 ──────────────────────────────
const GEMINI_KEY = 'AIzaSyCF2V8sjzzuyVK4wqk9UCV0A3tf9VMXb8U';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_KEY}`;

const CAT_LIST = getCats().map(c=>`${c.id}:${c.name}`).join(', ');

async function geminiParse(text) {
  const today = new Date();
  const todayStr = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  const yesterdayStr = new Date(today-864e5).toLocaleDateString('zh-TW');

  const prompt = `你是一個記帳助理，請從以下語音辨識文字中提取記帳資訊，並以 JSON 格式回傳。

今天日期：${todayStr}
昨天日期：${yesterdayStr}

可用分類（格式為 id:名稱）：${CAT_LIST}

請從這段文字提取：「${text}」

回傳格式（只回傳 JSON，不要有其他文字）：
{
  "amount": 數字（金額，沒有就填0）,
  "cat": "分類id（從上方清單選最符合的）",
  "subCat": "子分類（如早餐/午餐/晚餐/加油等，沒有就填空字串）",
  "detail": "明細描述（去掉金額和時間後的主要內容）",
  "date": "日期（格式 YYYY/M/D，今天就填${todayStr}，昨天就填${yesterdayStr}）",
  "pay": "付款方式（cash=現金/card=信用卡，預設cash）"
}`;

  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{parts: [{text: prompt}]}],
      generationConfig: {temperature: 0.1, maxOutputTokens: 256}
    })
  });
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  // 清除 markdown 符號
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function applyGeminiResult(result) {
  // 金額
  if (result.amount > 0) {
    astr = String(result.amount).slice(0, 7);
    refreshAmt();
  }
  // 分類
  if (result.cat) {
    const el = document.querySelector(`.cchip[onclick="selC('${result.cat}',this)"]`);
    if (el) { selC(result.cat, el); }
  }
  // 子分類
  if (result.subCat) {
    const ss = document.getElementById('sub-sel');
    for (let i = 0; i < ss.options.length; i++) {
      if (ss.options[i].text === result.subCat) { ss.selectedIndex = i; break; }
    }
  }
  // 明細
  if (result.detail) document.getElementById('tx-detail').value = result.detail;
  // 日期
  if (result.date) {
    const d = new Date(result.date.replace(/\//g, '-'));
    if (!isNaN(d)) {
      const now = new Date();
      d.setHours(now.getHours(), now.getMinutes());
      document.getElementById('tx-dt').value =
        new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
    }
  }
  // 付款方式
  if (result.pay === 'card') {
    const el = document.getElementById('pay-card');
    if (el) setPay('card', el);
  }
}

function initVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('voice-btn').style.display='none'; return; }
  voiceRec = new SR();
  voiceRec.lang = 'zh-TW';
  voiceRec.continuous = false;
  voiceRec.interimResults = false;
  voiceRec.onresult = async e => {
    const text = e.results[0][0].transcript;
    stopVoice();
    document.getElementById('voice-btn').textContent = '🤖 AI 解析中...';
    document.getElementById('voice-btn').style.opacity = '0.7';
    toast(`辨識：${text}`, 'info');
    try {
      const result = await geminiParse(text);
      applyGeminiResult(result);
      // 金額有了就直接跳到詳情頁
      if (result.amount > 0 && document.getElementById('s1').style.display !== 'none') {
        goStep2();
      }
      toast('✅ AI 解析完成！請確認資料', 'info');
    } catch(err) {
      console.warn('[Gemini]', err);
      toast('AI 解析失敗，請手動輸入', 'warn');
    } finally {
      document.getElementById('voice-btn').innerHTML = '🎤 <span id="voice-txt">語音輸入</span>';
      document.getElementById('voice-btn').style.opacity = '1';
    }
  };
  voiceRec.onerror = () => { stopVoice(); toast('語音辨識失敗，請再試', 'err'); };
  voiceRec.onend = () => stopVoice();
}

function toggleVoice(){
  if (isListening) { stopVoice(); return; }
  if (!voiceRec) { toast('此裝置不支援語音輸入', 'warn'); return; }
  try {
    voiceRec.start(); isListening = true;
    const btn = document.getElementById('voice-btn');
    btn.classList.add('listening');
    document.getElementById('voice-txt').textContent = '聆聽中…說完後自動停止';
  } catch(e) { toast('請允許麥克風權限', 'warn'); }
}
function stopVoice(){
  isListening = false;
  try { voiceRec && voiceRec.stop(); } catch {}
  const btn = document.getElementById('voice-btn');
  btn.classList.remove('listening');
  const vtxt = document.getElementById('voice-txt');
  if (vtxt) vtxt.textContent = '語音輸入';
}

function submit(){
  const amt=parseInt(astr)||0;
  if(!amt){toast('金額不可為 0','warn');return;}
  if(!selCat){toast('請選擇分類','warn');return;}
  if(pay==='card'&&!selCard){toast('請先至錢包頁新增信用卡','warn');return;}
  if(pay==='icard'&&!selIcard){toast('請先至錢包頁新增悠遊卡','warn');return;}
  const dtv=document.getElementById('tx-dt').value;
  const tx={amount:amt,cat:selCat,subCat:document.getElementById('sub-sel').value,detail:document.getElementById('tx-detail').value.trim(),person,pay,cardId:pay==='card'?selCard:null,icardId:pay==='icard'?selIcard:null,at:dtv?new Date(dtv).toISOString():new Date().toISOString()};
  addTx(tx);fbAddTx(tx);
  // Discord 通知（每筆記帳 + 預算警示）
  discordOnAdd(tx);
  checkBudgetAlert(tx).then(res=>{
    if(res&&res.pct>=100) setTimeout(()=>toast(`🚨 ${catName(tx.cat)} 已超支！`,'err'),1400);
    else if(res&&res.pct>=(getDiscord().budgetPct||80)) setTimeout(()=>toast(`⚠️ ${catName(tx.cat)} 已用 ${Math.round(res.pct)}%`,'warn'),1400);
  });
  const bud=getBudget(tx.cat);
  if(bud){const now=new Date();const sp=txByMonth(now.getFullYear(),now.getMonth()+1).filter(t=>t.cat===tx.cat).reduce((s,t)=>s+t.amount,0);const pct=sp/bud;if(pct>=1)setTimeout(()=>toast(`⚠️ ${catName(tx.cat)} 預算超支！`,'err'),1400);else if(pct>=.8)setTimeout(()=>toast(`🔔 已用 ${Math.round(pct*100)}%`,'warn'),1400);}
  const sov=document.getElementById('sov');sov.classList.add('show');setTimeout(()=>sov.classList.remove('show'),1300);
  toast(`記帳 $${fmt(amt)} 成功！`);resetForm();
}

function resetForm(){
  astr='';
  document.getElementById('aval').textContent='0';document.getElementById('adisp').classList.remove('has-val');
  document.getElementById('s1').style.display='block';document.getElementById('s2').style.display='none';
  document.getElementById('tx-detail').value='';document.getElementById('sub-fg').style.display='none';
  document.getElementById('card-fg').style.display=pay==='card'?'block':'none';
  document.getElementById('icard-fg').style.display=pay==='icard'?'block':'none';
  const now=new Date();document.getElementById('tx-dt').value=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  setStep(0);buildCatChips();buildIcardChips();
}
function setStep(s){const hints=['輸入金額','填寫詳情','完成'];document.getElementById('shint').textContent=hints[s]||'';[0,1,2].forEach(i=>{const d=document.getElementById('d'+i);d.className='sd'+(i<s?' done':i===s?' on':'');});}

let _tt;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

init();
</script>
