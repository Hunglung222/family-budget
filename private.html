<script>
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2400);
}

// ── 語音記帳 ─────────────────────────────────────────
let voiceRec = null;
function startVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此裝置不支援語音，請直接輸入','warn'); return; }
  if (voiceRec) { try { voiceRec.stop(); } catch {} return; }
  const rec = new SR();
  rec.lang = 'zh-TW'; rec.interimResults = false; rec.continuous = false;
  const btn = document.getElementById('voice-btn');
  rec.onstart = () => {
    voiceRec = rec;
    btn.innerHTML = '🔴 錄音中…';
    btn.style.borderColor = '#f43f5e';
    toast('聆聽中…說完自動辨識', 'info');
  };
  rec.onresult = (e) => { submitVoiceAI(e.results[0][0].transcript); };
  rec.onerror  = (e) => { if(e.error!=='aborted') toast('語音辨識失敗，請再試','err'); };
  rec.onend    = () => {
    voiceRec = null;
    btn.innerHTML = '🎤 語音記帳';
    btn.style.borderColor = 'var(--border)';
  };
  try { rec.start(); } catch(e) { toast('請允許麥克風權限','warn'); }
}

async function submitVoiceAI(text) {
  if (!text) return;
  const btn = document.getElementById('voice-btn');
  btn.innerHTML = '⏳ AI 解析中…'; btn.disabled = true;
  try {
    const key = localStorage.getItem('claude_api_key')||'';
    if (!key) { toast('請先在設定頁填入 Claude API Key','err'); return; }
    const cats = getCats().map(c=>`${c.id}(${c.name})`).join(', ');
    const today = new Date();
    const todayStr = fmtD(today.toISOString());
    const yestStr  = fmtD(new Date(today.getTime()-864e5).toISOString());
    const prompt = `你是記帳助理。從這段文字提取記帳資訊並回傳純 JSON（不要 markdown）。
今天:${todayStr} 昨天:${yestStr}
可用分類(id:名稱): ${cats}
文字:「${text}」
回傳純JSON:{"amount":數字,"cat":"分類id","detail":"說明","date":"YYYY-MM-DD","pay":"cash或card"}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-haiku-4-5',max_tokens:512,messages:[{role:'user',content:prompt}]})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    let clean = (data.content?.[0]?.text||'').trim();
    if (clean.includes('```json')) clean = clean.split('```json')[1].split('```')[0];
    else if (clean.includes('```')) clean = clean.split('```')[1].split('```')[0];
    const r = JSON.parse(clean.trim());
    if (r.amount > 0) document.getElementById('p-amt').value = r.amount;
    if (r.cat) document.getElementById('p-cat').value = r.cat;
    if (r.detail) document.getElementById('p-detail').value = r.detail;
    if (r.pay) document.getElementById('p-pay').value = r.pay==='card'?'card':'cash';
    if (r.date) {
      const parts = r.date.replace(/[\/\.]/g,'-').split('-');
      if (parts.length===3) document.getElementById('p-date').value =
        `${parts[0].padStart(4,'0')}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
    }
    toast('✅ AI 解析完成，請確認後按記錄', 'info');
  } catch(e) {
    const msg = e.message||'';
    if(msg.includes('Failed to fetch')||msg.includes('fetch')){
      toast('📶 網路受限，請關閉 WiFi 改用行動網路再試', 'err');
    } else {
      toast('❌ AI 解析失敗，請改用行動網路再試', 'err');
    }
  } finally {
    btn.innerHTML = '🎤 語音記帳'; btn.disabled = false;
  }
}

// ── 初始化 ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async ()=>{
  const email = localStorage.getItem('current_email')||'';
  if(email !== 'kevin67222@gmail.com'){
    document.querySelector('.w').innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:var(--t3)"><div style="font-size:3rem;margin-bottom:16px">🔒</div><div style="font-size:1.1rem">此功能僅限宏龍使用</div></div>';
    return;
  }
  applyTheme();
  await fbPullPrivTx();
  initPrivatePage();
});

function initPrivatePage(){
  const sel = document.getElementById('p-cat');
  getCats().forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; sel.appendChild(o); });
  const today = new Date();
  document.getElementById('p-date').value =
    new Date(today.getTime()-today.getTimezoneOffset()*60000).toISOString().slice(0,10);
  renderPrivList();
}

function addPrivRecord(){
  const amt    = parseInt(document.getElementById('p-amt').value)||0;
  const cat    = document.getElementById('p-cat').value;
  const detail = document.getElementById('p-detail').value.trim();
  const pay    = document.getElementById('p-pay').value;
  const date   = document.getElementById('p-date').value;
  if(!amt)  { toast('請輸入金額','warn'); return; }
  if(!cat)  { toast('請選擇分類','warn'); return; }
  const [yyyy,mm,dd] = date.split('-').map(Number);
  const tx = { amount:amt, cat, detail, pay, cardId:null, icardId:null,
    at: new Date(yyyy,mm-1,dd,12,0,0).toISOString(), person:'宏龍', private:true };
  addPrivTx(tx);
  fbAddPrivTx(tx);
  document.getElementById('p-amt').value='';
  document.getElementById('p-detail').value='';
  renderPrivList();
  toast('🔒 私密記帳已記錄');
}

function renderPrivList(){
  // 去重：以 id 為準
  const seen = new Set();
  const list = getPrivTx().filter(t=>{ if(seen.has(t.id)) return false; seen.add(t.id); return true; });
  const el   = document.getElementById('priv-list');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--t3)"><div style="font-size:2.5rem;margin-bottom:12px">🔒</div><div>尚無私密記帳</div></div>';
    return;
  }
  const total = list.reduce((s,t)=>s+t.amount,0);
  el.innerHTML = `<div style="text-align:right;font-size:.8rem;color:var(--t3);margin-bottom:8px">共 ${list.length} 筆，合計 <span style="color:var(--danger);font-weight:700">-$${fmt(total)}</span></div>` +
    list.map(t=>`
    <div class="data-card" style="padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:rgba(139,92,246,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0">${catFind(t.cat)?.name?.split(' ')[0]||'📦'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.88rem;font-weight:600">${t.detail||catName(t.cat)}</div>
        <div style="font-size:.72rem;color:var(--t3)">${fmtD(t.at)} · ${catName(t.cat)} · ${t.pay==='card'?'💳':'💵'}</div>
      </div>
      <div style="font-weight:900;color:var(--danger);flex-shrink:0">-$${fmt(t.amount)}</div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="openEdit('${t.id}',${t.amount},'${(t.detail||'').replace(/'/g,"\\'")}')"
          style="padding:5px 8px;background:var(--card2);border:1px solid var(--border);color:var(--t2);border-radius:6px;font-size:.75rem;cursor:pointer;font-family:inherit">✏️</button>
        <button onclick="delPrivRecord('${t.id}')"
          style="padding:5px 8px;background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:var(--danger);border-radius:6px;font-size:.75rem;cursor:pointer;font-family:inherit">🗑</button>
      </div>
    </div>`).join('');
}

function delPrivRecord(id){
  if(!confirm('確定刪除此私密記帳？')) return;
  delPrivTx(id); fbDelPrivTx(id); renderPrivList(); toast('已刪除');
}
function openEdit(id, amt, detail){
  document.getElementById('e-id').value=id;
  document.getElementById('e-amt').value=amt;
  document.getElementById('e-detail').value=detail;
  document.getElementById('edit-modal').style.display='flex';
}
function closeEditModal(){ document.getElementById('edit-modal').style.display='none'; }
function saveEdit(){
  const id     = document.getElementById('e-id').value;
  const amt    = parseInt(document.getElementById('e-amt').value)||0;
  const detail = document.getElementById('e-detail').value.trim();
  if(!amt){ toast('請輸入金額','warn'); return; }
  editPrivTx(id,{amount:amt,detail});
  fbEditPrivTx(id,{amount:amt,detail});
  closeEditModal(); renderPrivList(); toast('✅ 已更新');
}
</script>
