<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>錢包</title>
<link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--bg2:#111827;--card:#1a2235;--card2:#202d42;--border:#2a3550;--p:#00e5b4;--p2:#00b48e;--pdim:rgba(0,229,180,.12);--blue:#4f8ef7;--bluedim:rgba(79,142,247,.12);--warn:#f59e0b;--danger:#f43f5e;--ok:#22c55e;--t:#e8edf8;--t2:#8896b3;--t3:#4a5670;--r:18px;--rs:10px;--nav:70px;--tr:.18s cubic-bezier(.4,0,.2,1)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:calc(var(--nav)+env(safe-area-inset-bottom))}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select{font-family:inherit;outline:none;border:none}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:1.2rem;font-weight:900}
.hdr small{font-size:.75rem;color:var(--t2);display:block;margin-top:1px}

.wrap{padding:16px}

.wallet-hero{background:linear-gradient(145deg,#0a2540,#061520);border:1px solid #1e4060;border-radius:var(--r);padding:28px 24px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px}
.wallet-hero::before{content:'💵';position:absolute;font-size:9rem;right:-20px;top:50%;transform:translateY(-50%);opacity:.06;pointer-events:none}
.wlbl{font-size:.72rem;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.wamt{font-size:3.4rem;font-weight:900;letter-spacing:-.04em;color:var(--p);line-height:1}
.wamt .cur{font-size:1.4rem;font-weight:500;color:var(--t2);margin-right:4px}
.wupd{font-size:.72rem;color:var(--t3);margin-top:8px}

.section-t{font-size:.72rem;font-weight:700;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px}

.qadd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.qb{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px 4px;font-size:.88rem;font-weight:700;color:var(--t2);text-align:center;transition:var(--tr);-webkit-tap-highlight-color:transparent}
.qb:active{background:var(--pdim);border-color:var(--p);color:var(--p);transform:scale(.95)}
.row{display:flex;gap:8px;align-items:stretch}
.fc{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 16px;color:var(--t);font-size:.95rem;transition:border-color var(--tr);-webkit-appearance:none;appearance:none}
.fc:focus{border-color:var(--p);background:var(--card2)}
.btn-add{padding:13px 20px;background:linear-gradient(135deg,var(--p),var(--p2));color:#000;border-radius:var(--rs);font-size:.9rem;font-weight:900;white-space:nowrap;transition:var(--tr);border:none;font-family:inherit;cursor:pointer}
.btn-add:active{transform:scale(.96)}

.card-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-hdr-t{font-size:.78rem;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase}
.btn-new-card{background:var(--pdim);color:var(--p);border:none;border-radius:8px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr)}
.btn-new-card:active{transform:scale(.95)}

.citem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.citem:last-child{border-bottom:none}
.cdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cinfo{flex:1}
.cname{font-size:.9rem;font-weight:600}
.clast{font-size:.72rem;color:var(--t3);margin-top:1px}
.btn-del{background:none;border:none;color:var(--t3);font-size:1rem;padding:4px 8px;cursor:pointer;border-radius:6px;transition:var(--tr)}
.btn-del:active{color:var(--danger);background:rgba(244,63,94,.1)}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.scard.g::before{background:var(--p)}.scard.b::before{background:var(--blue)}
.slbl{font-size:.65rem;color:var(--t2);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.sval{font-size:1.4rem;font-weight:900;letter-spacing:-.03em}
.sval .u{font-size:.75rem;font-weight:400;color:var(--t2);margin-right:2px}

.hist-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.hitem{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hitem:last-child{border-bottom:none}
.hico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.hico.in{background:rgba(34,197,94,.15)}.hico.out{background:rgba(244,63,94,.12)}
.hinfo{flex:1;min-width:0}
.hnote{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htime{font-size:.68rem;color:var(--t3);margin-top:2px}
.hamt{font-size:.95rem;font-weight:900;letter-spacing:-.02em}
.hamt.in{color:var(--ok)}.hamt.out{color:#ff6b82}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.overlay.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 20px 36px;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.overlay.show .sheet{transform:translateY(0)}
.sh{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.st{font-size:1.05rem;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:12px}
.flbl{font-size:.75rem;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:block}
.btn-row{display:flex;gap:10px}
.btn{width:100%;padding:15px;border-radius:var(--r);font-size:1rem;font-weight:900;font-family:inherit;transition:var(--tr);cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#000;box-shadow:0 4px 18px rgba(0,229,180,.3)}
.btn-p:active{transform:scale(.98)}
.btn-s{background:var(--card);color:var(--t2);border:1.5px solid var(--border)}
.btn-s:active{background:var(--card2)}
.btn-d{background:rgba(244,63,94,.14);color:var(--danger);border:1.5px solid rgba(244,63,94,.3)}

.empty{text-align:center;padding:24px;color:var(--t3);font-size:.88rem}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav)+env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);font-size:.65rem;font-weight:600;letter-spacing:.04em;-webkit-tap-highlight-color:transparent;position:relative;transition:var(--tr)}
.ni .ico{font-size:1.4rem;line-height:1}
.ni.on{color:var(--p)}
.ni.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--p);border-radius:0 0 4px 4px}
.ni-add{flex:0 0 72px}
.ni-add .fab{width:52px;height:52px;margin-top:-8px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 6px 20px rgba(0,229,180,.4);transition:var(--tr)}
.ni-add:active .fab{transform:scale(.92)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--ok);color:#fff;padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:700;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}.toast.warn{background:var(--warn)}

input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
<script>
// ═══════════════════════════════════════════════════════
//  firebase.js  —  Firebase Firestore 雙向同步模組
//  使用 Firebase v9 compat 模式（CDN，無需 npm）
// ═══════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA2FVuIV_5sMUxd851XhTcSMQIg0m1Lh6M",
  authDomain: "family-budget-aed64.firebaseapp.com",
  projectId: "family-budget-aed64",
  storageBucket: "family-budget-aed64.firebasestorage.app",
  messagingSenderId: "714512661107",
  appId: "1:714512661107:web:022f9c7f7b828b5eb9c806"
};

// ── 初始化 ────────────────────────────────────────────
let _db = null;

function fbInit() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    _db = firebase.firestore();
    console.log('[Firebase] 連線成功');
    return true;
  } catch(e) {
    console.warn('[Firebase] 初始化失敗', e);
    return false;
  }
}

function getDb() {
  if (!_db) fbInit();
  return _db;
}

// ── 集合名稱 ─────────────────────────────────────────
// 兩人共用同一個 Firestore，資料對雙方即時同步
const COL = {
  TX:    'transactions',
  WAL:   'wallet',
  CATS:  'categories',
  CARDS: 'cards',
  BUD:   'budgets',
};

// ══════════════════════════════════════════════════════
//  交易 - 新增
// ══════════════════════════════════════════════════════
async function fbAddTx(tx) {
  try {
    const db = getDb();
    await db.collection(COL.TX).doc(tx.id).set(tx);
    console.log('[Firebase] 交易已同步:', tx.id);
  } catch(e) {
    console.warn('[Firebase] 新增交易失敗', e);
  }
}

// ══════════════════════════════════════════════════════
//  交易 - 刪除
// ══════════════════════════════════════════════════════
async function fbDelTx(id) {
  try {
    await getDb().collection(COL.TX).doc(id).delete();
    console.log('[Firebase] 交易已刪除:', id);
  } catch(e) {
    console.warn('[Firebase] 刪除交易失敗', e);
  }
}

// ══════════════════════════════════════════════════════
//  即時監聽 - 交易列表（兩支手機都會即時更新）
// ══════════════════════════════════════════════════════
function fbListenTx(onChange) {
  try {
    const db = getDb();
    return db.collection(COL.TX)
      .orderBy('at', 'desc')
      .onSnapshot(snapshot => {
        const list = [];
        snapshot.forEach(doc => list.push(doc.data()));
        // 同步到 localStorage
        DB.set('tx', list);
        onChange && onChange(list);
        console.log('[Firebase] 即時同步', list.length, '筆交易');
      }, err => {
        console.warn('[Firebase] 監聽失敗', err);
      });
  } catch(e) {
    console.warn('[Firebase] 監聽初始化失敗', e);
    return null;
  }
}

// ══════════════════════════════════════════════════════
//  錢包同步
// ══════════════════════════════════════════════════════
async function fbSyncWallet(walData) {
  try {
    await getDb().collection(COL.WAL).doc('main').set(walData);
  } catch(e) {
    console.warn('[Firebase] 錢包同步失敗', e);
  }
}

function fbListenWallet(onChange) {
  try {
    return getDb().collection(COL.WAL).doc('main')
      .onSnapshot(doc => {
        if (doc.exists) {
          const data = doc.data();
          DB.set('wal', data);
          onChange && onChange(data);
        }
      });
  } catch(e) {
    console.warn('[Firebase] 錢包監聽失敗', e);
    return null;
  }
}

// ══════════════════════════════════════════════════════
//  分類、卡片、預算同步（較少變動，手動觸發）
// ══════════════════════════════════════════════════════
async function fbSyncCats(data)  {
  try { await getDb().collection(COL.CATS).doc('main').set({list: data}); } catch(e) {}
}
async function fbSyncCards(data) {
  try { await getDb().collection(COL.CARDS).doc('main').set({list: data}); } catch(e) {}
}
async function fbSyncBud(data)   {
  try { await getDb().collection(COL.BUD).doc('main').set(data); } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  完整下載（首次載入時從雲端拉資料）
// ══════════════════════════════════════════════════════
async function fbPullAll() {
  try {
    const db = getDb();
    // 交易
    const txSnap = await db.collection(COL.TX).orderBy('at','desc').get();
    const txList = [];
    txSnap.forEach(d => txList.push(d.data()));
    if (txList.length) DB.set('tx', txList);

    // 錢包
    const walDoc = await db.collection(COL.WAL).doc('main').get();
    if (walDoc.exists) DB.set('wal', walDoc.data());

    // 分類
    const catDoc = await db.collection(COL.CATS).doc('main').get();
    if (catDoc.exists && catDoc.data().list) DB.set('cats', catDoc.data().list);

    // 卡片
    const cardDoc = await db.collection(COL.CARDS).doc('main').get();
    if (cardDoc.exists && cardDoc.data().list) DB.set('cards', cardDoc.data().list);

    // 預算
    const budDoc = await db.collection(COL.BUD).doc('main').get();
    if (budDoc.exists) DB.set('bud', budDoc.data());

    console.log('[Firebase] 完整下載完成，交易', txList.length, '筆');
    return true;
  } catch(e) {
    console.warn('[Firebase] 下載失敗', e);
    return false;
  }
}

// ══════════════════════════════════════════════════════
//  清除雲端資料
// ══════════════════════════════════════════════════════
async function fbClearAll() {
  try {
    const db = getDb();
    const txSnap = await db.collection(COL.TX).get();
    const batch = db.batch();
    txSnap.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection(COL.WAL).doc('main'));
    batch.delete(db.collection(COL.CATS).doc('main'));
    batch.delete(db.collection(COL.CARDS).doc('main'));
    batch.delete(db.collection(COL.BUD).doc('main'));
    await batch.commit();
    console.log('[Firebase] 雲端資料已清除');
  } catch(e) {
    console.warn('[Firebase] 清除失敗', e);
  }
}

</script>
</head>
<body>
<header class="hdr">
  <div><h1>👛 錢包</h1><small>現金管理</small></div>
</header>

<div class="wrap">

<!-- 新增卡片 Modal -->

  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="cm-title"></div>
    <p id="cm-msg" style="color:var(--t2);font-size:.9rem;margin-bottom:20px;line-height:1.6"></p>

      <button class="btn btn-s" onclick="closeModal('confirm-modal')">取消</button>
      <button class="btn btn-d" id="cm-ok">確認</button>
    </div>
  </div>
</div>

<script>
const DB={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const DEF_CATS=[{id:'food',name:'🍜 餐飲',color:'#10b981',sub:['早餐','午餐','晚餐','飲料','零食','聚餐']},{id:'transport',name:'🚌 交通',color:'#3b82f6',sub:['加油','捷運/公車','停車費','計程車']},{id:'shopping',name:'🛍️ 購物',color:'#f59e0b',sub:['服飾','3C','日用品','網購']},{id:'home',name:'🏠 居家',color:'#ec4899',sub:['房租','水費','電費','瓦斯','網路']},{id:'medical',name:'💊 醫療',color:'#8b5cf6',sub:['掛號','藥費','健檢','牙科']},{id:'entertain',name:'🎬 娛樂',color:'#06b6d4',sub:['電影','遊戲','訂閱','旅遊']},{id:'education',name:'📚 教育',color:'#84cc16',sub:['學費','補習','課程']},{id:'child',name:'👶 育兒',color:'#f97316',sub:['奶粉','玩具','衣物','托育']},{id:'other',name:'📦 其他',color:'#94a3b8',sub:['禮金','捐款','雜費']}];
const DEF_CARDS=[{id:'c1',name:'國泰世華',last4:'1234',color:'#1d4ed8'},{id:'c2',name:'台新玫瑰',last4:'5678',color:'#be185d'},{id:'c3',name:'中信鈦金',last4:'9012',color:'#374151'}];
function initDB(){
  const mg=(o,n)=>{const v=localStorage.getItem(o);if(v&&!DB.get(n)){try{DB.set(n,JSON.parse(v))}catch{}}localStorage.removeItem(o);};
  mg('fb_transactions','tx');mg('fb_wallet','wal');mg('fb_categories','cats');mg('fb_cards','cards');mg('fb_budgets','bud');mg('fb_tx','tx');mg('fb_cats','cats');
  if(!DB.get('cats'))DB.set('cats',DEF_CATS);if(!DB.get('cards'))DB.set('cards',DEF_CARDS);if(!DB.get('wal'))DB.set('wal',{balance:0,history:[]});if(!DB.get('bud'))DB.set('bud',{});if(!DB.get('tx'))DB.set('tx',[]);
}
function getTx(){return DB.get('tx')||[];}
function addTx(tx){const l=getTx();tx.id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);tx.at=tx.at||new Date().toISOString();l.unshift(tx);DB.set('tx',l);if(tx.pay==='cash')walOut(tx.amount,tx.detail||catName(tx.cat));return tx;}
function delTx(id){const l=getTx();const t=l.find(x=>x.id===id);DB.set('tx',l.filter(x=>x.id!==id));if(t&&t.pay==='cash')walIn(t.amount,'刪除還原');}
function txByMonth(y,m){return getTx().filter(t=>{const d=new Date(t.at);return d.getFullYear()===y&&d.getMonth()+1===m});}
function txByRange(f,e){const s=new Date(f),en=new Date(e);en.setHours(23,59,59);return getTx().filter(t=>{const d=new Date(t.at);return d>=s&&d<=en});}
function getWal(){return DB.get('wal')||{balance:0,history:[]};}
function walIn(n,note){const w=getWal();w.balance+=n;w.history.unshift({type:'in',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function walOut(n,note){const w=getWal();w.balance=Math.max(0,w.balance-n);w.history.unshift({type:'out',amount:n,note,time:new Date().toISOString()});DB.set('wal',w);}
function getCats(){return DB.get('cats')||DEF_CATS;}
function catFind(id){return getCats().find(c=>c.id===id)||{name:id,color:'#94a3b8',sub:[]};}
function catName(id){return catFind(id).name;}
function addCat(c){const l=getCats();c.id='cat_'+Date.now().toString(36);l.push(c);DB.set('cats',l);}
function getCards(){return DB.get('cards')||DEF_CARDS;}
function cardFind(id){return getCards().find(c=>c.id===id)||null;}
function addCard(c){const l=getCards();c.id='cc_'+Date.now().toString(36);l.push(c);DB.set('cards',l);}
function delCard(id){DB.set('cards',getCards().filter(c=>c.id!==id));}
function getBud(){return DB.get('bud')||{};}
function getBudget(id){return getBud()[id]||0;}
function setBudget(id,n){const b=getBud();b[id]=n;DB.set('bud',b);}
function calcStats(list){const t=list.reduce((s,x)=>s+x.amount,0);const cash=list.filter(x=>x.pay==='cash').reduce((s,x)=>s+x.amount,0);const card=list.filter(x=>x.pay==='card').reduce((s,x)=>s+x.amount,0);const byCat={},byCard={},byPerson={};list.forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount;byPerson[x.person]=(byPerson[x.person]||0)+x.amount;if(x.pay==='card'&&x.cardId)byCard[x.cardId]=(byCard[x.cardId]||0)+x.amount;});return{total:t,cash,card,byCat,byCard,byPerson};}
function fmt(n){return Number(n).toLocaleString('zh-TW');}
function fmtT(s){const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtD(s){const d=new Date(s);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}
function groupDay(list){const g={};[...list].sort((a,b)=>new Date(b.at)-new Date(a.at)).forEach(t=>{const k=fmtD(t.at);if(!g[k])g[k]=[];g[k].push(t);});return g;}
function makeDemo(){const now=new Date(),y=now.getFullYear(),m=now.getMonth();const mk=(cat,detail,amount,pay,cardId,person,day,h,mi)=>({id:Date.now().toString(36)+Math.random().toString(36).slice(2),cat,detail,amount,pay,cardId:cardId||null,person,at:new Date(y,m,day,h,mi).toISOString(),subCat:''});return[mk('food','早餐豆漿油條',65,'cash',null,'宏龍',1,8,30),mk('food','家樂福採購',1280,'card','c1','盈慧',1,11,20),mk('transport','捷運悠遊卡',500,'cash',null,'宏龍',2,9,0),mk('food','晚餐火鍋',850,'card','c2','宏龍',3,18,45),mk('child','寶寶奶粉',1200,'card','c1','盈慧',4,14,10),mk('entertain','Netflix',330,'card','c2','宏龍',5,10,0),mk('medical','兒科掛號',200,'cash',null,'盈慧',6,15,30),mk('shopping','運動上衣',680,'card','c1','盈慧',8,13,20),mk('home','電費帳單',1450,'card','c3','宏龍',9,10,0),mk('child','幼稚園費用',8000,'card','c3','盈慧',14,9,0)];}
initDB();
</script>

  <script>
function init(){render();renderCards();renderStats()}

function render(){
  const w=wallet();
  document.getElementById('bal').textContent=fmt(w.balance);
  if(w.history.length) document.getElementById('wupd').textContent='更新：'+new Date(w.history[0].time).toLocaleString('zh-TW');
  const h=document.getElementById('hist');
  if(!w.history.length){h.innerHTML='<div class="empty">尚無記錄</div>';return}
  h.innerHTML=w.history.slice(0,30).map(e=>`
    <div class="hitem">
      <div class="hico ${e.type}">${e.type==='in'?'⬆️':'⬇️'}</div>
      <div class="hinfo">
        <div class="hnote">${e.note||'現金'}</div>
        <div class="htime">${new Date(e.time).toLocaleString('zh-TW')}</div>
      </div>
      <div class="hamt ${e.type}">${e.type==='in'?'+':'-'}$${fmt(e.amount)}</div>
    </div>`).join('');
}

function renderCards(){
  const cs=cards();
  const el=document.getElementById('card-list');
  if(!cs.length){el.innerHTML='<div class="empty">尚無信用卡</div>';return}
  el.innerHTML=cs.map(c=>`
    <div class="citem">
      <div class="cdot" style="background:${c.color||'#4f8ef7'}"></div>
      <div class="cinfo">
        <div class="cname">${c.name}</div>
        <div class="clast">···· ···· ···· ${c.last4}</div>
      </div>
      <button class="btn-del" onclick="delCard('${c.id}')">🗑️</button>
    </div>`).join('');
}

function renderStats(){
  const now=new Date();
  const txs=txMonth(now.getFullYear(),now.getMonth()+1);
  const out=txs.filter(t=>t.pay==='cash').reduce((s,t)=>s+t.amount,0);
  const w=wallet();
  const inn=w.history.filter(h=>{
    const d=new Date(h.time);
    return h.type==='in'&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }).reduce((s,h)=>s+h.amount,0);
  document.getElementById('m-out').textContent=fmt(out);
  document.getElementById('m-in').textContent=fmt(inn);
}

function qadd(n){walIn(n,'提領現金');fbSyncWallet(getWal());toast(`已新增 $${fmt(n)}`);render();renderStats()}
function addCustom(){
  const n=parseInt(document.getElementById('custom-amt').value)||0;
  if(!n){toast('請輸入金額','warn');return}
  walletIn(n,'手動新增');document.getElementById('custom-amt').value='';
  toast(`已新增 $${fmt(n)}`);render();renderStats();
}

function showAddCard(){document.getElementById('card-modal').classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function submitCard(){
  const name=document.getElementById('nc-name').value.trim();
  const last4=document.getElementById('nc-last4').value.trim();
  if(!name||!last4){toast('請填寫完整','warn');return}
  const cols=['#1d4ed8','#be185d','#374151','#0d9488','#7c3aed'];
  cardAdd({name,last4,color:cols[Math.floor(Math.random()*cols.length)]});
  closeModal('card-modal');renderCards();toast(`已新增 ${name}`);
  document.getElementById('nc-name').value='';document.getElementById('nc-last4').value='';
}

function delCard(id){
  document.getElementById('cm-title').textContent='刪除信用卡';
  document.getElementById('cm-msg').textContent='確定刪除這張卡片嗎？';
  document.getElementById('confirm-modal').classList.add('show');
  document.getElementById('cm-ok').onclick=()=>{cardDel(id);closeModal('confirm-modal');renderCards();toast('已刪除','err')};
}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

init();
</script>
