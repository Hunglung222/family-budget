<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>錢包</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<header class="hdr">
  <div><h1>👛 錢包</h1><div class="hdr-sub">現金管理</div></div>
</header>

<div class="w">
  <!-- 餘額 -->
  <div class="wallet-hero">
    <div class="wlbl">現金餘額</div>
    <div class="wamt"><span class="cur">$</span><span id="bal">0</span></div>
    <div class="wupd" id="wupd"></div>
  </div>

  <!-- 快速提領 -->
  <div class="qadd">
    <div class="sec-t" style="margin-top:0">➕ 提領現金</div>
    <div class="qgrid">
      <button class="qb" onclick="qadd(500)">500</button>
      <button class="qb" onclick="qadd(1000)">1,000</button>
      <button class="qb" onclick="qadd(2000)">2,000</button>
      <button class="qb" onclick="qadd(5000)">5,000</button>
    </div>
    <div class="row">
      <input type="number" class="fc" id="custom-amt" placeholder="自訂金額" style="flex:1">
      <button class="btn-add" onclick="addCustom()">＋ 新增</button>
    </div>
  </div>

  <!-- 本月統計 -->
  <div class="sg2">
    <div class="sc g"><div class="sc-lbl">本月現金支出</div><div class="sc-val"><span class="u">$</span><span id="m-out">0</span></div></div>
    <div class="sc b"><div class="sc-lbl">本月現金收入</div><div class="sc-val"><span class="u">$</span><span id="m-in">0</span></div></div>
  </div>

  <!-- 信用卡管理 -->
  <div class="card-box">
    <div class="card-hdr">
      <span class="card-hdr-t">💳 信用卡</span>
      <button class="btn-nc" onclick="showAddCard()">＋ 新增卡片</button>
    </div>
    <div id="card-list"></div>
  </div>

  <!-- 現金記錄 -->
  <div class="sec-t">📋 現金記錄</div>
  <div class="hist-box"><div id="hist"></div></div>
</div>

<!-- 新增卡片 Modal -->
<div class="ov" id="card-modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st">💳 新增信用卡</div>
    <div class="fg">
      <span class="flbl">銀行 / 卡名</span>
      <input type="text" class="fc" id="nc-name" placeholder="例：台新玫瑰卡">
    </div>
    <div class="fg">
      <span class="flbl">末四碼</span>
      <input type="number" class="fc" id="nc-last4" placeholder="1234">
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeModal('card-modal')">取消</button>
      <button class="btn btn-p" onclick="submitCard()">新增</button>
    </div>
  </div>
</div>

<!-- 確認 Modal -->
<div class="ov" id="confirm-modal">
  <div class="sheet">
    <div class="sh"></div>
    <div class="st" id="cm-title"></div>
    <p id="cm-msg" style="color:var(--t2);font-size:.9rem;margin-bottom:18px;line-height:1.6"></p>
    <div class="btn-row">
      <button class="btn btn-s" onclick="closeModal('confirm-modal')">取消</button>
      <button class="btn btn-d" id="cm-ok">確認</button>
    </div>
  </div>
</div>

<nav class="nav">
  <a class="ni" href="./index.html"><span class="ic">🏠</span><span>首頁</span></a>
  <a class="ni" href="./report.html"><span class="ic">📊</span><span>報表</span></a>
  <a class="ni ni-add" href="./add.html"><div class="fab">➕</div></a>
  <a class="ni on" href="./wallet.html"><span class="ic">👛</span><span>錢包</span></a>
  <a class="ni" href="./settings.html"><span class="ic">⚙️</span><span>設定</span></a>
</nav>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="./js/db.js"></script>
<script src="./js/firebase.js"></script>
<script src="./js/ui.js"></script>
<script>
function init() { renderWallet(); renderCards(); renderStats(); }

function renderWallet() {
  const w = getWal();
  document.getElementById('bal').textContent = fmt(w.balance);
  if (w.history.length)
    document.getElementById('wupd').textContent = '更新：' + new Date(w.history[0].time).toLocaleString('zh-TW');
  const h = document.getElementById('hist');
  if (!w.history.length) { h.innerHTML = '<div style="color:var(--t3);font-size:.88rem;text-align:center;padding:16px">尚無記錄</div>'; return; }
  h.innerHTML = w.history.slice(0, 30).map(e => `
    <div class="hitem">
      <div class="hico ${e.type}">${e.type==='in'?'⬆️':'⬇️'}</div>
      <div class="hinfo">
        <div class="hnote">${e.note||'現金'}</div>
        <div class="htime">${new Date(e.time).toLocaleString('zh-TW')}</div>
      </div>
      <div class="hamt ${e.type}">${e.type==='in'?'+':'-'}$${fmt(e.amount)}</div>
    </div>`).join('');
}

function renderCards() {
  const cs = getCards();
  const el = document.getElementById('card-list');
  if (!cs.length) { el.innerHTML = '<div style="color:var(--t3);font-size:.85rem;text-align:center;padding:12px">尚無信用卡</div>'; return; }
  el.innerHTML = cs.map(c => `
    <div class="citem">
      <div class="cdot" style="background:${c.color||'#4f8ef7'}"></div>
      <div class="cinfo"><div class="cname">${c.name}</div><div class="clast">···· ···· ···· ${c.last4}</div></div>
      <button class="btn-del-c" onclick="confirmDelCard('${c.id}')">🗑️</button>
    </div>`).join('');
}

function renderStats() {
  const now = new Date();
  const txs = txByMonth(now.getFullYear(), now.getMonth()+1);
  const out = txs.filter(t=>t.pay==='cash').reduce((s,t)=>s+t.amount, 0);
  const w = getWal();
  const inn = w.history.filter(h => {
    const d = new Date(h.time);
    return h.type==='in' && d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  }).reduce((s,h)=>s+h.amount, 0);
  document.getElementById('m-out').textContent = fmt(out);
  document.getElementById('m-in').textContent  = fmt(inn);
}

function qadd(n) { walIn(n, '提領現金'); fbSyncWal(); toast(`已新增 $${fmt(n)}`); renderWallet(); renderStats(); }
function addCustom() {
  const n = parseInt(document.getElementById('custom-amt').value) || 0;
  if (!n) { toast('請輸入金額', 'warn'); return; }
  walIn(n, '手動新增'); fbSyncWal();
  document.getElementById('custom-amt').value = '';
  toast(`已新增 $${fmt(n)}`); renderWallet(); renderStats();
}

function showAddCard() { document.getElementById('card-modal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function submitCard() {
  const name = document.getElementById('nc-name').value.trim();
  const last4 = document.getElementById('nc-last4').value.trim();
  if (!name || !last4) { toast('請填寫完整', 'warn'); return; }
  const cols = ['#1d4ed8','#be185d','#374151','#0d9488','#7c3aed'];
  addCard({ name, last4, color: cols[Math.floor(Math.random()*cols.length)] });
  closeModal('card-modal'); renderCards(); toast(`已新增 ${name}`);
  document.getElementById('nc-name').value = '';
  document.getElementById('nc-last4').value = '';
}
function confirmDelCard(id) {
  document.getElementById('cm-title').textContent = '刪除信用卡';
  document.getElementById('cm-msg').textContent = '確定刪除這張卡片嗎？';
  document.getElementById('confirm-modal').classList.add('show');
  document.getElementById('cm-ok').onclick = () => { delCard(id); closeModal('confirm-modal'); renderCards(); toast('已刪除','err'); };
}

let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2400);
}

init();
</script>
</body>
</html>
